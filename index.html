<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listening Party</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: #e2e8f0;
      }

      main {
        width: min(90vw, 420px);
        padding: 2rem;
        border-radius: 1rem;
        background: #1e293b;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.75rem;
      }

      p {
        margin: 0;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="title">Listening Party</h1>
      <p id="message">Welcome to the main page.</p>
    </main>
    <script>
      (function restrictAccess() {
        const isPhone = /Android.+Mobile|iPhone|iPod|Windows Phone|Mobile/i.test(navigator.userAgent);
        const localHosts = new Set(["localhost", "127.0.0.1", "::1"]);
        const isLocal = localHosts.has(window.location.hostname);
        const title = document.getElementById("title");
        const message = document.getElementById("message");

        if (!isPhone || !isLocal) {
          title.textContent = "Access Restricted";
          message.textContent = "This page is available only on phones from a local address.";
        }
      })();
    </script>
  </body>
</html>
