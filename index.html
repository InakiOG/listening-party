<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listening Party</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --layout-top-space: 5.5rem;
        --layout-bottom-space: 0.65rem;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        overflow: hidden;
      }

      body {
        margin: 0;
        height: 100dvh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        box-sizing: border-box;
        padding-top: var(--layout-top-space);
        padding-bottom: var(--layout-bottom-space);
        background: #0f172a;
        color: #e2e8f0;
      }

      main {
        position: relative;
        z-index: 10;
        width: min(96vw, 420px);
        height: calc(100dvh - var(--layout-top-space) - var(--layout-bottom-space));
        max-height: calc(100dvh - var(--layout-top-space) - var(--layout-bottom-space));
        flex: 0 0 auto;
        overflow: auto;
        padding: clamp(0.75rem, 3vw, 2rem);
        border-radius: 1rem;
        background: #1e293b;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.75rem;
      }

      p {
        margin: 0;
        line-height: 1.5;
      }

      .now-playing {
        position: fixed;
        top: 0.6rem;
        left: 50%;
        transform: translateX(-50%);
        width: min(96vw, 420px);
        z-index: 20;
        border-radius: 0.75rem;
        border: 1px solid #334155;
        background: #0b1220;
        padding: 0.5rem;
      }

      .now-playing-controls {
        position: absolute;
        top: 0.45rem;
        right: 0.45rem;
        z-index: 30;
      }

      .now-playing-stop-button {
        border: 1px solid #ef4444;
        background: #7f1d1d;
        color: #fee2e2;
        border-radius: 0.4rem;
        padding: 0.2rem 0.45rem;
        font-size: 0.68rem;
        cursor: pointer;
      }

      .now-playing[hidden] {
        display: none;
      }

      .now-playing-artwork {
        position: relative;
        width: 76px;
        height: 46px;
        flex: 0 0 76px;
      }

      .now-playing img {
        position: relative;
        z-index: 3;
        width: 46px;
        height: 46px;
        border-radius: 0.4rem;
        object-fit: cover;
      }

      .now-playing-disc {
        --disc-color: #0b0b0b;
        position: absolute;
        top: 50%;
        right: 15px;
        width: 46px;
        height: 46px;
        border-radius: 50%;
        transform: translateY(-50%);
        background:
          radial-gradient(circle at center, #0f172a 0 8%, #d4d4d8 8.5% 10.5%, transparent 11%),
          repeating-radial-gradient(circle at center, rgba(255, 255, 255, 0.08) 0 2px, rgba(0, 0, 0, 0.08) 2px 4px),
          radial-gradient(circle at 30% 22%, rgba(255, 255, 255, 0.3), transparent 45%),
          var(--disc-color);
        box-shadow: 0 0 0 2px rgba(15, 23, 42, 0.7), 0 5px 14px rgba(0, 0, 0, 0.45);
        z-index: 1;
        animation: spinNowPlayingDisc var(--np-spin-primary, 2.2s) linear infinite;
      }

      .now-playing-disc.clear-vinyl {
        background:
          radial-gradient(circle at center, #f8fafc 0 8.2%, #cbd5e1 8.5% 10.2%, transparent 10.6%),
          radial-gradient(circle at center, transparent 0 74%, rgba(255, 255, 255, 0.78) 74.4% 76.2%, transparent 76.6%),
          repeating-radial-gradient(circle at center, rgba(255, 255, 255, 0.28) 0 2px, rgba(203, 213, 225, 0.18) 2px 4px),
          radial-gradient(circle at 28% 20%, rgba(255, 255, 255, 0.86), transparent 47%),
          var(--disc-color);
      }

      .now-playing-disc.cd-disc {
        background:
          radial-gradient(circle at center, transparent 0 8%, rgba(220, 225, 235, 0.95) 8.5% 11.5%, transparent 12%),
          radial-gradient(circle at center, transparent 0 42%, rgba(148, 163, 184, 0.22) 42.5% 43.5%, transparent 44%),
          conic-gradient(
            from 10deg,
            rgba(255, 170, 170, 0.45),
            rgba(255, 240, 160, 0.45),
            rgba(170, 255, 215, 0.45),
            rgba(170, 210, 255, 0.45),
            rgba(220, 170, 255, 0.45),
            rgba(255, 170, 170, 0.45)
          ),
          radial-gradient(circle at 28% 20%, rgba(255, 255, 255, 0.52), transparent 46%),
          linear-gradient(145deg, #d8e1ea, #a8b4c3 35%, #e6edf6 65%, #95a1b0);
      }

      .now-playing-disc.secondary {
        right: 2px;
        transform: translateY(-50%) scale(0.92);
        z-index: 0;
        opacity: 0;
        animation: spinNowPlayingDiscSecondary var(--np-spin-secondary, 2.9s) linear infinite reverse;
      }

      .now-playing-disc.secondary.visible {
        opacity: 0.96;
      }

      @keyframes spinNowPlayingDisc {
        from {
          transform: translateY(-50%) rotate(0deg);
        }
        to {
          transform: translateY(-50%) rotate(360deg);
        }
      }

      @keyframes spinNowPlayingDiscSecondary {
        from {
          transform: translateY(-50%) scale(0.92) rotate(0deg);
        }
        to {
          transform: translateY(-50%) scale(0.92) rotate(360deg);
        }
      }

      .now-playing-toggle {
        width: 100%;
        border: 0;
        background: transparent;
        color: inherit;
        padding: 0;
        display: flex;
        align-items: center;
        gap: 0.6rem;
        text-align: left;
        cursor: pointer;
      }

      .now-playing-copy {
        flex: 1;
      }

      .now-playing-hint {
        color: #94a3b8;
        font-size: 0.72rem;
      }

      .now-playing-label {
        color: #7dd3fc;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .now-playing-text {
        color: #e2e8f0;
        font-size: 0.85rem;
      }

      .review-panel {
        margin-top: 0.55rem;
        border-top: 1px solid #334155;
        padding-top: 0.55rem;
      }

      .review-panel[hidden] {
        display: none;
      }

      .review-panel label {
        display: block;
        text-align: left;
        font-size: 0.75rem;
        color: #94a3b8;
        margin: 0.4rem 0 0.2rem;
      }

      .review-panel input,
      .review-panel textarea {
        width: 100%;
        border: 1px solid #334155;
        border-radius: 0.5rem;
        padding: 0.45rem;
        box-sizing: border-box;
        background: #0f172a;
        color: #e2e8f0;
        font-size: 0.8rem;
      }

      .review-panel textarea {
        min-height: 64px;
        resize: vertical;
      }

      .rating-label {
        display: block;
        text-align: left;
        font-size: 0.75rem;
        color: #94a3b8;
        margin: 0.5rem 0 0.2rem;
      }

      .star-rating {
        display: flex;
        align-items: center;
        gap: 0.15rem;
      }

      .star-button {
        border: 0;
        background: transparent;
        padding: 0;
        margin: 0;
        cursor: pointer;
        font-size: 1.4rem;
        line-height: 1;
        color: #334155;
      }

      .star-button.full {
        color: #facc15;
      }

      .star-button.half {
        background: linear-gradient(90deg, #facc15 50%, #334155 50%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .rating-value {
        margin-top: 0.2rem;
        text-align: left;
        font-size: 0.72rem;
        color: #cbd5e1;
      }

      .review-actions {
        margin-top: 0.5rem;
        display: flex;
        align-items: center;
        gap: 0.45rem;
        flex-wrap: wrap;
      }

      .save-review-button {
        border: 1px solid #0ea5e9;
        background: #0284c7;
        color: #f8fafc;
        border-radius: 0.5rem;
        padding: 0.35rem 0.6rem;
        font-size: 0.78rem;
        cursor: pointer;
      }

      .open-album-button {
        border: 1px solid #38bdf8;
        background: #075985;
        color: #e0f2fe;
        border-radius: 0.5rem;
        padding: 0.35rem 0.6rem;
        font-size: 0.78rem;
        cursor: pointer;
      }

      .review-status {
        font-size: 0.72rem;
        color: #93c5fd;
      }

      .auth-overlay {
        position: fixed;
        inset: 0;
        z-index: 120;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        background: rgba(2, 6, 23, 0.9);
      }

      .auth-overlay[hidden] {
        display: none;
      }

      .auth-card {
        width: min(92vw, 360px);
        border: 1px solid #334155;
        border-radius: 0.9rem;
        padding: 0.9rem;
        background: #0f172a;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.45);
        text-align: left;
      }

      .auth-card h2 {
        margin: 0 0 0.45rem;
        font-size: 1rem;
      }

      .auth-help {
        margin: 0;
        color: #94a3b8;
        font-size: 0.77rem;
      }

      .auth-field-label {
        display: block;
        margin: 0.65rem 0 0.2rem;
        color: #94a3b8;
        font-size: 0.75rem;
      }

      .auth-card input[type="text"],
      .auth-card input[type="password"],
      .auth-card input[type="file"] {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #334155;
        border-radius: 0.5rem;
        padding: 0.48rem;
        background: #111827;
        color: #e2e8f0;
        font-size: 0.82rem;
      }

      .auth-actions {
        margin-top: 0.7rem;
        display: flex;
        gap: 0.45rem;
      }

      .auth-button {
        border: 1px solid #334155;
        background: #1e293b;
        color: #f8fafc;
        border-radius: 0.5rem;
        padding: 0.4rem 0.6rem;
        font-size: 0.78rem;
        cursor: pointer;
      }

      .auth-button.primary {
        border-color: #0ea5e9;
        background: #0284c7;
      }

      .auth-status {
        margin: 0.5rem 0 0;
        min-height: 1rem;
        color: #93c5fd;
        font-size: 0.74rem;
      }

      .profile-hub {
        position: fixed;
        right: 0.65rem;
        bottom: 0.7rem;
        z-index: 80;
      }

      .profile-hub[hidden] {
        display: none;
      }

      .profile-avatar-button {
        width: 54px;
        height: 54px;
        border-radius: 999px;
        border: 2px solid #38bdf8;
        padding: 0;
        background: #0f172a;
        overflow: hidden;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        cursor: pointer;
      }

      .profile-avatar-button img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .profile-menu {
        position: absolute;
        right: 0;
        bottom: 62px;
        min-width: 180px;
        border: 1px solid #334155;
        border-radius: 0.7rem;
        background: #0f172a;
        padding: 0.45rem;
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }

      .profile-menu[hidden] {
        display: none;
      }

      .profile-menu button {
        border: 1px solid #334155;
        border-radius: 0.45rem;
        background: #1e293b;
        color: #f8fafc;
        padding: 0.34rem 0.45rem;
        text-align: left;
        font-size: 0.76rem;
        cursor: pointer;
      }

      .profile-menu-user {
        margin: 0;
        color: #7dd3fc;
        font-size: 0.74rem;
      }

      .profile-section {
        margin-top: 0.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.42rem;
      }

      .profile-section label {
        font-size: 0.7rem;
        color: #93c5fd;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .profile-section textarea,
      .profile-section input[type="text"] {
        border: 1px solid #334155;
        border-radius: 0.42rem;
        background: #020617;
        color: #e2e8f0;
        padding: 0.32rem 0.42rem;
        font-size: 0.74rem;
      }

      .profile-section textarea {
        resize: vertical;
        min-height: 56px;
      }

      .profile-top-album-block {
        border: 1px solid #334155;
        border-radius: 0.55rem;
        background: #0b1220;
        padding: 0.38rem;
      }

      .profile-top-album-heading {
        margin: 0 0 0.32rem;
        color: #f8fafc;
        font-size: 0.74rem;
      }

      .profile-top-album-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.32rem;
      }

      .profile-top-album-field {
        display: flex;
        flex-direction: column;
        gap: 0.16rem;
      }

      .profile-top-album-field label {
        margin: 0;
      }

      .profile-top-album-preview {
        margin-top: 0.34rem;
        width: 100%;
        display: flex;
        align-items: center;
        gap: 0.42rem;
      }

      .profile-top-album-preview img {
        width: 48px;
        height: 48px;
        border-radius: 0.45rem;
        border: 1px solid #334155;
        object-fit: cover;
        background: #0f172a;
      }

      .profile-top-album-preview span {
        color: #94a3b8;
        font-size: 0.7rem;
      }

      .profile-section .save-profile-button {
        border: 1px solid #22c55e;
        border-radius: 0.45rem;
        background: #166534;
        color: #f0fdf4;
        padding: 0.34rem 0.45rem;
        text-align: center;
        font-size: 0.74rem;
        cursor: pointer;
      }

      .profile-section .profile-save-status {
        margin: 0;
        color: #94a3b8;
        font-size: 0.68rem;
      }

      .profile-view {
        text-align: left;
      }

      .profile-view[hidden] {
        display: none;
      }

      .profile-card {
        border: 1px solid #334155;
        border-radius: 0.8rem;
        background: #0f172a;
        padding: 0.65rem;
      }

      .profile-card h2 {
        margin: 0 0 0.4rem;
        font-size: 1rem;
      }

      .profile-primary-actions {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        flex-wrap: wrap;
      }

      .profile-primary-actions button {
        border: 1px solid #334155;
        border-radius: 0.45rem;
        background: #1e293b;
        color: #f8fafc;
        padding: 0.34rem 0.5rem;
        font-size: 0.75rem;
        cursor: pointer;
      }

      .reviews-view {
        text-align: left;
      }

      .reviews-view[hidden] {
        display: none;
      }

      .reviews-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.55rem;
      }

      .reviews-header h2 {
        margin: 0;
        font-size: 1rem;
      }

      .back-button {
        border: 1px solid #334155;
        border-radius: 0.5rem;
        background: #1e293b;
        color: #f8fafc;
        padding: 0.3rem 0.55rem;
        font-size: 0.76rem;
        cursor: pointer;
      }

      .my-reviews-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
      }

      .my-review-item {
        border: 1px solid #334155;
        border-radius: 0.6rem;
        padding: 0.5rem;
        background: #0f172a;
      }

      .my-review-item p {
        margin: 0.1rem 0;
        font-size: 0.8rem;
      }

      .my-review-meta {
        color: #7dd3fc;
      }

      .my-review-date {
        color: #94a3b8;
        font-size: 0.72rem;
      }

      .bubble-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 60;
      }

      .active-users-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 55;
      }

      .active-user-bubble {
        position: absolute;
        width: 42px;
        height: 42px;
        border-radius: 999px;
        border: 2px solid rgba(226, 232, 240, 0.82);
        overflow: hidden;
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.45);
        pointer-events: auto;
        user-select: none;
        touch-action: none;
        cursor: grab;
        animation: floatUserBubble var(--duration, 18s) ease-in-out var(--delay, 0s) infinite alternate;
      }

      .active-user-bubble.dragging {
        cursor: grabbing;
        animation-play-state: paused;
      }

      .active-user-bubble.expanded {
        width: min(78vw, 290px);
        height: auto;
        min-height: 42px;
        border-radius: 0.82rem;
        animation-play-state: paused;
        z-index: 90;
        background: rgba(15, 23, 42, 0.94);
      }

      .active-user-bubble.expanded > img,
      .active-user-bubble.expanded > .active-user-letter {
        width: 42px;
        height: 42px;
        border-radius: 999px;
        margin: 0.35rem;
        border: 1px solid rgba(148, 163, 184, 0.55);
      }

      .active-user-bubble-details {
        display: none;
      }

      .active-user-bubble.expanded .active-user-bubble-details {
        display: block;
        padding: 0.25rem 0.48rem 0.48rem;
      }

      .active-user-detail-name {
        margin: 0 0 0.2rem;
        color: #f8fafc;
        font-size: 0.78rem;
        font-weight: 700;
      }

      .active-user-detail-label {
        margin: 0.2rem 0 0.06rem;
        color: #7dd3fc;
        font-size: 0.62rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .active-user-detail-value {
        margin: 0;
        color: #cbd5e1;
        font-size: 0.68rem;
        line-height: 1.3;
        word-break: break-word;
      }

      .active-user-detail-empty {
        color: #94a3b8;
      }

      .active-user-top-albums-list {
        list-style: none;
        margin: 0.16rem 0 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 0.24rem;
      }

      .active-user-top-album-item {
        display: flex;
        align-items: center;
        gap: 0.34rem;
        color: #e2e8f0;
        font-size: 0.67rem;
      }

      .active-user-top-album-art {
        width: 30px;
        height: 30px;
        border-radius: 0.35rem;
        overflow: hidden;
        flex: 0 0 30px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: #1e293b;
        border: 1px solid #334155;
      }

      .active-user-top-album-art img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .active-user-top-album-placeholder {
        color: #94a3b8;
        font-size: 0.8rem;
      }

      .active-user-top-album-title {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .active-user-bubble img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .active-user-letter {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #f8fafc;
        font-size: 1rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      @keyframes floatUserBubble {
        0% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(calc(var(--drift-x, 22px) * 0.6), calc(var(--drift-y, -18px) * 0.6));
        }
        100% {
          transform: translate(var(--drift-x, 22px), var(--drift-y, -18px));
        }
      }

      .review-bubble {
        position: absolute;
        max-width: min(45vw, 220px);
        padding: 0.55rem 0.65rem;
        border-radius: 0.9rem;
        border: 1px solid rgba(56, 189, 248, 0.45);
        background: rgba(15, 23, 42, 0.58);
        color: #e2e8f0;
        font-size: 0.72rem;
        line-height: 1.35;
        pointer-events: auto;
        user-select: none;
        touch-action: none;
        cursor: grab;
        animation: floatBubble var(--duration, 22s) ease-in-out var(--delay, 0s) infinite alternate;
      }

      .review-bubble.song-review {
        border-color: rgba(56, 189, 248, 0.45);
        background: rgba(15, 23, 42, 0.58);
      }

      .review-bubble.album-review {
        border-color: rgba(251, 191, 36, 0.55);
        background: rgba(44, 27, 4, 0.6);
      }

      .review-bubble.dragging {
        cursor: grabbing;
        animation-play-state: paused;
      }

      .review-bubble-summary {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 0.25rem 0.4rem;
        flex-wrap: wrap;
      }

      .review-avatar-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.28rem;
        border-radius: 999px;
        padding: 0.1rem 0.38rem 0.1rem 0.12rem;
        border: 1px solid rgba(125, 211, 252, 0.7);
        background: rgba(15, 23, 42, 0.75);
      }

      .review-bubble.album-review .review-avatar-badge {
        border-color: rgba(251, 191, 36, 0.8);
        background: rgba(69, 26, 3, 0.58);
      }

      .review-avatar-image {
        width: 24px;
        height: 24px;
        border-radius: 999px;
        object-fit: cover;
        border: 1px solid rgba(148, 163, 184, 0.45);
      }

      .review-avatar-score {
        color: #f8fafc;
        font-size: 0.67rem;
        white-space: nowrap;
      }

      .review-bubble-name {
        color: #7dd3fc;
        font-size: 0.68rem;
        margin: 0;
      }

      .review-bubble.album-review .review-bubble-name {
        color: #fbbf24;
      }

      .review-bubble-scope {
        margin: 0;
        font-size: 0.62rem;
        color: #cbd5e1;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .review-bubble-rating {
        margin: 0;
        color: #facc15;
      }

      .review-bubble-text {
        display: none;
        margin-top: 0.35rem;
      }

      .review-bubble.expanded {
        background: rgba(15, 23, 42, 0.8);
      }

      .review-bubble.album-review.expanded {
        background: rgba(44, 27, 4, 0.82);
      }

      .review-bubble.expanded .review-bubble-text {
        display: block;
      }

      .review-history-list {
        margin: 0.4rem 0 0;
        padding-left: 1rem;
        max-height: 150px;
        overflow: auto;
      }

      .review-history-item + .review-history-item {
        margin-top: 0.38rem;
      }

      .review-history-meta {
        margin: 0;
        font-size: 0.66rem;
        color: #93c5fd;
      }

      .review-history-text {
        margin: 0.1rem 0 0;
      }

      @keyframes floatBubble {
        0% {
          transform: translate(0, 0) rotate(-1deg);
        }
        33% {
          transform: translate(calc(var(--drift-x, 32px) * 0.6), calc(var(--drift-y, -26px) * 0.6)) rotate(1deg);
        }
        66% {
          transform: translate(calc(var(--drift-x, 32px) * 0.95), calc(var(--drift-y, -26px) * 0.95)) rotate(-0.8deg);
        }
        100% {
          transform: translate(var(--drift-x, 32px), var(--drift-y, -26px)) rotate(1.2deg);
        }
      }

      .albums {
        margin-top: 1.5rem;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0.4rem;
        text-align: left;
      }

      .album-sort-controls {
        margin-top: 0.8rem;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 0.4rem;
        flex-wrap: wrap;
        font-size: 0.76rem;
      }

      .album-sort-controls label {
        color: #94a3b8;
      }

      .album-sort-controls select,
      .album-sort-controls button {
        border: 1px solid #334155;
        border-radius: 0.45rem;
        background: #0b1220;
        color: #e2e8f0;
        padding: 0.28rem 0.45rem;
        font-size: 0.76rem;
      }

      .album-sort-controls button {
        cursor: pointer;
        min-width: 110px;
      }

      .album-card {
        position: relative;
        border-radius: 0.75rem;
        overflow: hidden;
        background: #0f172a;
        border: 1px solid #334155;
        transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
        transform-origin: center center;
      }

      .album-card.expanded {
        border-color: #7dd3fc;
        box-shadow: 0 0 0 2px rgba(125, 211, 252, 0.18);
        transform: scale(1.02);
        grid-column: 1 / -1;
        overflow: visible;
      }

      .album-card.album-opening {
        animation: albumCardOpen 520ms cubic-bezier(0.18, 0.84, 0.28, 1);
      }

      .cover-button {
        width: 100%;
        padding: 0;
        border: 0;
        background: transparent;
        display: block;
        cursor: pointer;
        position: relative;
        overflow: visible;
        isolation: isolate;
      }

      .album-card.expanded .cover-button {
        width: 70%;
        margin-right: auto;
      }

      .cover-button img {
        width: 100%;
        aspect-ratio: 1 / 1;
        display: block;
        object-fit: cover;
        position: relative;
        z-index: 1;
      }

      .cover-button img.not-owned {
        filter: grayscale(1) brightness(0.72);
      }

      .vinyl-overlay {
        position: absolute;
        top: 50%;
        right: -30%;
        width: 92%;
        aspect-ratio: 1 / 1;
        display: block;
        pointer-events: none;
        opacity: 0;
        transition: opacity 220ms ease;
        z-index: 0;
        transform: translateY(-50%);
      }

      .vinyl-overlay.cd-overlay {
        right: -25%;
        width: 88%;
      }

      .vinyl-disc {
        --vinyl-color: #0b0b0b;
        position: absolute;
        inset: 0;
        width: 100%;
        aspect-ratio: 1 / 1;
        border-radius: 50%;
        background:
          radial-gradient(circle at center, #0f172a 0 8%, #d4d4d8 8.4% 10.5%, transparent 11%),
          radial-gradient(circle at center, transparent 0 74%, rgba(255, 255, 255, 0.35) 74.5% 76%, transparent 76.5%),
          repeating-radial-gradient(circle at center, rgba(255, 255, 255, 0.08) 0 2px, rgba(0, 0, 0, 0.08) 2px 4px),
          radial-gradient(circle at 30% 22%, rgba(255, 255, 255, 0.26), transparent 45%),
          var(--vinyl-color);
        box-shadow: 0 0 0 2px rgba(15, 23, 42, 0.65), 0 8px 22px rgba(0, 0, 0, 0.5);
        z-index: 1;
      }

      .vinyl-disc-primary {
        z-index: 3;
      }

      .vinyl-disc-secondary {
        transform: translateX(18%) scale(0.95);
        opacity: 0.96;
        filter: saturate(1.08) brightness(1.02);
        z-index: 2;
      }

      .vinyl-disc.clear-vinyl {
        background:
          radial-gradient(circle at center, #f8fafc 0 8.2%, #cbd5e1 8.5% 10.2%, transparent 10.6%),
          radial-gradient(circle at center, transparent 0 74%, rgba(255, 255, 255, 0.78) 74.4% 76.2%, transparent 76.6%),
          repeating-radial-gradient(circle at center, rgba(255, 255, 255, 0.28) 0 2px, rgba(203, 213, 225, 0.18) 2px 4px),
          radial-gradient(circle at 28% 20%, rgba(255, 255, 255, 0.86), transparent 47%),
          var(--vinyl-color);
        box-shadow: 0 0 0 2px rgba(226, 232, 240, 0.86), 0 8px 22px rgba(0, 0, 0, 0.35);
      }

      .cd-disc {
        background:
          radial-gradient(circle at center, transparent 0 8%, rgba(220, 225, 235, 0.95) 8.5% 11.5%, transparent 12%),
          radial-gradient(circle at center, transparent 0 42%, rgba(148, 163, 184, 0.22) 42.5% 43.5%, transparent 44%),
          conic-gradient(
            from 10deg,
            rgba(255, 170, 170, 0.45),
            rgba(255, 240, 160, 0.45),
            rgba(170, 255, 215, 0.45),
            rgba(170, 210, 255, 0.45),
            rgba(220, 170, 255, 0.45),
            rgba(255, 170, 170, 0.45)
          ),
          radial-gradient(circle at 28% 20%, rgba(255, 255, 255, 0.52), transparent 46%),
          linear-gradient(145deg, #d8e1ea, #a8b4c3 35%, #e6edf6 65%, #95a1b0);
        box-shadow: 0 0 0 2px rgba(148, 163, 184, 0.55), 0 8px 22px rgba(0, 0, 0, 0.45);
      }

      .album-card.expanded .vinyl-overlay {
        opacity: 1;
      }

      .album-card.album-opening .vinyl-overlay {
        animation: albumDiscReveal 520ms cubic-bezier(0.22, 0.82, 0.22, 1);
      }

      .album-card.expanded .vinyl-disc-primary {
        animation: spinVinyl 2.4s linear infinite;
      }

      .album-card.expanded .cd-disc {
        animation: spinCd 1.9s linear infinite;
      }

      .album-card.expanded .vinyl-disc-secondary {
        animation: spinVinylSecondary 3.1s linear infinite reverse;
      }

      .album-card.album-opening .cover-button img {
        animation: albumCoverSettle 420ms ease-out;
      }

      @keyframes spinVinyl {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes spinVinylSecondary {
        from {
          transform: translateX(14%) scale(0.95) rotate(0deg);
        }
        to {
          transform: translateX(14%) scale(0.95) rotate(360deg);
        }
      }

      @keyframes spinCd {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .album-details {
        max-height: 0;
        opacity: 0;
        transform: translateY(-6px);
        overflow: hidden;
        transition: max-height 220ms ease, opacity 220ms ease, transform 220ms ease;
      }

      .album-card.expanded .album-details {
        max-height: 5000px;
        opacity: 1;
        transform: translateY(0);
        overflow: visible;
        padding: 0.6rem 0.65rem 0.75rem;
      }

      .album-card.album-opening .album-details {
        animation: albumDetailsEnter 460ms ease-out;
      }

      @keyframes albumCardOpen {
        0% {
          transform: scale(0.94);
          box-shadow: 0 0 0 0 rgba(125, 211, 252, 0), 0 10px 28px rgba(2, 6, 23, 0.22);
        }
        52% {
          transform: scale(1.04);
          box-shadow: 0 0 0 2px rgba(125, 211, 252, 0.26), 0 20px 35px rgba(2, 6, 23, 0.36);
        }
        100% {
          transform: scale(1.02);
          box-shadow: 0 0 0 2px rgba(125, 211, 252, 0.18), 0 14px 30px rgba(2, 6, 23, 0.28);
        }
      }

      @keyframes albumDiscReveal {
        0% {
          opacity: 0;
          transform: translateY(-50%) translateX(24%) scale(0.82);
          filter: saturate(0.82) brightness(0.9);
        }
        68% {
          opacity: 1;
          transform: translateY(-50%) translateX(-5%) scale(1.03);
          filter: saturate(1.1) brightness(1.03);
        }
        100% {
          opacity: 1;
          transform: translateY(-50%) translateX(0) scale(1);
          filter: saturate(1) brightness(1);
        }
      }

      @keyframes albumCoverSettle {
        0% {
          transform: scale(1.05);
          filter: brightness(1.08);
        }
        100% {
          transform: scale(1);
          filter: brightness(1);
        }
      }

      @keyframes albumDetailsEnter {
        0% {
          opacity: 0;
          transform: translateY(10px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .album-card.album-opening,
        .album-card.album-opening .vinyl-overlay,
        .album-card.album-opening .cover-button img,
        .album-card.album-opening .album-details {
          animation: none;
        }
      }

      .album-card h2 {
        margin: 0 0 0.25rem;
        font-size: 0.9rem;
      }

      .meta {
        color: #94a3b8;
        font-size: 0.82rem;
      }

      .notes {
        margin-top: 0.35rem;
        font-size: 0.82rem;
      }

      .gifted-by {
        margin-top: 0.28rem;
        font-size: 0.78rem;
        color: #cbd5e1;
      }

      .album-links {
        margin-top: 0.45rem;
        display: flex;
        align-items: center;
        gap: 0.45rem;
        flex-wrap: wrap;
      }

      .album-links .meta {
        margin: 0;
      }

      .album-action-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #22c55e;
        background: #166534;
        color: #f0fdf4;
        border-radius: 0.45rem;
        padding: 0.28rem 0.5rem;
        font-size: 0.74rem;
        text-decoration: none;
        cursor: pointer;
      }

      .listen-album-button {
        border-color: #f59e0b;
        background: #9a3412;
        color: #fff7ed;
      }

      .track-list {
        margin: 0.5rem 0 0;
        padding-left: 1.05rem;
        color: #cbd5e1;
        font-size: 0.8rem;
      }

      .track-list li + li {
        margin-top: 0.15rem;
      }

      .track-play-button {
        width: 100%;
        border: 1px solid #334155;
        border-radius: 0.4rem;
        background: #0b1220;
        color: #e2e8f0;
        text-align: left;
        font-size: 0.78rem;
        padding: 0.25rem 0.4rem;
        cursor: pointer;
      }

      .guest-label {
        margin: 0 0 0.45rem;
        color: #fbbf24;
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

    </style>
  </head>
  <body>
    <section id="auth-overlay" class="auth-overlay">
      <div class="auth-card">
        <h2>Entrar o registrarte</h2>
        <p class="auth-help">Escribe tu nombre y contraseña</p>
        <label class="auth-field-label" for="auth-name">Nombre</label>
        <input id="auth-name" type="text" placeholder="Tu nombre" />
        <label class="auth-field-label" for="auth-password">Contraseña</label>
        <input id="auth-password" type="password" placeholder="Tu Contraseña" />
        <label class="auth-field-label" for="auth-photo">Foto (solo al crear usuario)</label>
        <input id="auth-photo" type="file" accept="image/*" />
        <div class="auth-actions">
          <button id="auth-login" class="auth-button" type="button">Entrar</button>
          <button id="auth-register" class="auth-button primary" type="button">Crear usuario</button>
        </div>
        <p id="auth-status" class="auth-status"></p>
      </div>
    </section>

    <section id="now-playing" class="now-playing" hidden>
      <div id="now-playing-controls" class="now-playing-controls" hidden>
        <button id="now-playing-stop" class="now-playing-stop-button" type="button">Finalizar</button>
      </div>
      <button id="now-playing-toggle" class="now-playing-toggle" type="button" aria-expanded="false" aria-controls="review-panel">
        <div class="now-playing-artwork" aria-hidden="true">
          <img id="now-playing-cover" src="" alt="Currently playing album cover" />
          <span id="now-playing-disc" class="now-playing-disc"></span>
          <span id="now-playing-disc-secondary" class="now-playing-disc secondary"></span>
        </div>
        <div class="now-playing-copy">
          <p class="now-playing-label">Reproduciendo ahora</p>
          <p id="now-playing-text" class="now-playing-text"></p>
          <p class="now-playing-hint">Toca para calificar</p>
        </div>
      </button>

      <div id="review-panel" class="review-panel" hidden>
        <label for="album-review">Reseña</label>
        <textarea id="album-review" placeholder="Escribe tu reseña"></textarea>

        <p class="rating-label">Puntuacion</p>
        <div id="star-rating" class="star-rating" role="radiogroup" aria-label="Puntuacion del album">
          <button type="button" class="star-button" data-star="1" aria-label="1 star">★</button>
          <button type="button" class="star-button" data-star="2" aria-label="2 stars">★</button>
          <button type="button" class="star-button" data-star="3" aria-label="3 stars">★</button>
          <button type="button" class="star-button" data-star="4" aria-label="4 stars">★</button>
          <button type="button" class="star-button" data-star="5" aria-label="5 stars">★</button>
        </div>
        <p id="rating-value" class="rating-value">Puntuacion: 0 / 5</p>
        <div class="review-actions">
          <button id="save-review" class="save-review-button" type="button">Guardar reseña</button>
          <button id="open-now-playing-album" class="open-album-button" type="button">Ver álbum</button>
          <p id="review-status" class="review-status"></p>
        </div>
      </div>
    </section>
    <section id="active-users-layer" class="active-users-layer" aria-hidden="true"></section>
    <section id="bubble-layer" class="bubble-layer" aria-hidden="true"></section>

    <section id="profile-hub" class="profile-hub" hidden>
      <div id="profile-menu" class="profile-menu" hidden>
        <button id="open-profile" type="button">Perfil</button>
        <button id="logout-profile" type="button">Cerrar sesion</button>
      </div>
      <button id="profile-avatar-button" class="profile-avatar-button" type="button" aria-expanded="false" aria-controls="profile-menu">
        <img id="profile-avatar" src="./mi%20dise%C3%B1o.png" alt="Foto de perfil" />
      </button>
    </section>

    <main>
      <section id="main-view">
        <p class="guest-label">invitados</p>
        <h1 id="title">Listening Party</h1>
        <p id="message">Bienvenido a la pagina principal.</p>
        <div class="album-sort-controls" aria-label="Orden de albumes">
          <label for="album-sort-by">Ordenar por</label>
          <select id="album-sort-by" aria-label="Campo de orden">
            <option value="date">Fecha</option>
            <option value="score">Score</option>
            <option value="artist">Artista</option>
            <option value="title">Titulo</option>
          </select>
          <button id="album-sort-direction" type="button" aria-label="Cambiar direccion de orden">Descendente</button>
        </div>
        <section id="albums" class="albums" aria-live="polite"></section>
      </section>
      <section id="reviews-view" class="reviews-view" hidden>
        <div class="reviews-header">
          <h2>Mis reseñas</h2>
          <button id="reviews-back" class="back-button" type="button">Volver</button>
        </div>
        <ul id="my-reviews-list" class="my-reviews-list"></ul>
      </section>
      <section id="profile-view" class="profile-view" hidden>
        <div class="reviews-header">
          <h2>Perfil</h2>
          <button id="profile-back" class="back-button" type="button">Volver</button>
        </div>
        <article class="profile-card">
          <p id="profile-menu-user" class="profile-menu-user"></p>
          <div class="profile-primary-actions">
            <button id="change-photo" type="button">Cambiar foto</button>
            <input id="change-photo-input" type="file" accept="image/*" hidden />
            <button id="view-reviews" type="button">Ver reseñas</button>
          </div>
          <section class="profile-section" aria-label="Perfil">
            <label for="profile-description">Descripcion</label>
            <textarea id="profile-description" maxlength="150" placeholder="Escribe algo sobre ti"></textarea>
            <label for="profile-instagram">Instagram</label>
            <input id="profile-instagram" type="text" maxlength="40" placeholder="tu_usuario" />

            <div class="profile-top-album-block">
              <p class="profile-top-album-heading">Top album 1</p>
              <div class="profile-top-album-grid">
                <div class="profile-top-album-field">
                  <label for="profile-top-album-1">Album name</label>
                  <input id="profile-top-album-1" type="text" maxlength="150" placeholder="Album favorito 1" />
                </div>
                <div class="profile-top-album-field">
                  <label for="profile-top-album-1-artist">Album artist</label>
                  <input id="profile-top-album-1-artist" type="text" maxlength="120" placeholder="Artista album 1" />
                </div>
              </div>
              <div class="profile-top-album-preview">
                <img id="profile-top-album-1-cover" alt="Preview portada top album 1" hidden />
                <span id="profile-top-album-1-cover-empty">Sin portada</span>
              </div>
            </div>

            <div class="profile-top-album-block">
              <p class="profile-top-album-heading">Top album 2</p>
              <div class="profile-top-album-grid">
                <div class="profile-top-album-field">
                  <label for="profile-top-album-2">Album name</label>
                  <input id="profile-top-album-2" type="text" maxlength="150" placeholder="Album favorito 2" />
                </div>
                <div class="profile-top-album-field">
                  <label for="profile-top-album-2-artist">Album artist</label>
                  <input id="profile-top-album-2-artist" type="text" maxlength="120" placeholder="Artista album 2" />
                </div>
              </div>
              <div class="profile-top-album-preview">
                <img id="profile-top-album-2-cover" alt="Preview portada top album 2" hidden />
                <span id="profile-top-album-2-cover-empty">Sin portada</span>
              </div>
            </div>

            <div class="profile-top-album-block">
              <p class="profile-top-album-heading">Top album 3</p>
              <div class="profile-top-album-grid">
                <div class="profile-top-album-field">
                  <label for="profile-top-album-3">Album name</label>
                  <input id="profile-top-album-3" type="text" maxlength="150" placeholder="Album favorito 3" />
                </div>
                <div class="profile-top-album-field">
                  <label for="profile-top-album-3-artist">Album artist</label>
                  <input id="profile-top-album-3-artist" type="text" maxlength="120" placeholder="Artista album 3" />
                </div>
              </div>
              <div class="profile-top-album-preview">
                <img id="profile-top-album-3-cover" alt="Preview portada top album 3" hidden />
                <span id="profile-top-album-3-cover-empty">Sin portada</span>
              </div>
            </div>

            <button id="save-profile" class="save-profile-button" type="button">Guardar perfil</button>
            <p id="profile-save-status" class="profile-save-status"></p>
          </section>
        </article>
      </section>
    </main>
    <script src="./app.js?v=20260421-3"></script>
  </body>
