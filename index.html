<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listening Party</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding-top: 5.5rem;
        background: #0f172a;
        color: #e2e8f0;
      }

      main {
        position: relative;
        z-index: 10;
        width: min(96vw, 420px);
        margin-top: 0.35rem;
        max-height: calc(100vh - 6.25rem);
        overflow: auto;
        padding: clamp(0.75rem, 3vw, 2rem);
        border-radius: 1rem;
        background: #1e293b;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.75rem;
      }

      p {
        margin: 0;
        line-height: 1.5;
      }

      .now-playing {
        position: fixed;
        top: 0.6rem;
        left: 50%;
        transform: translateX(-50%);
        width: min(96vw, 420px);
        z-index: 20;
        border-radius: 0.75rem;
        border: 1px solid #334155;
        background: #0b1220;
        padding: 0.5rem;
      }

      .now-playing[hidden] {
        display: none;
      }

      .now-playing img {
        width: 46px;
        height: 46px;
        border-radius: 0.4rem;
        object-fit: cover;
      }

      .now-playing-toggle {
        width: 100%;
        border: 0;
        background: transparent;
        color: inherit;
        padding: 0;
        display: flex;
        align-items: center;
        gap: 0.6rem;
        text-align: left;
        cursor: pointer;
      }

      .now-playing-copy {
        flex: 1;
      }

      .now-playing-hint {
        color: #94a3b8;
        font-size: 0.72rem;
      }

      .now-playing-label {
        color: #7dd3fc;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .now-playing-text {
        color: #e2e8f0;
        font-size: 0.85rem;
      }

      .review-panel {
        margin-top: 0.55rem;
        border-top: 1px solid #334155;
        padding-top: 0.55rem;
      }

      .review-panel[hidden] {
        display: none;
      }

      .review-panel label {
        display: block;
        text-align: left;
        font-size: 0.75rem;
        color: #94a3b8;
        margin: 0.4rem 0 0.2rem;
      }

      .review-panel input,
      .review-panel textarea {
        width: 100%;
        border: 1px solid #334155;
        border-radius: 0.5rem;
        padding: 0.45rem;
        box-sizing: border-box;
        background: #0f172a;
        color: #e2e8f0;
        font-size: 0.8rem;
      }

      .review-panel textarea {
        min-height: 64px;
        resize: vertical;
      }

      .rating-label {
        display: block;
        text-align: left;
        font-size: 0.75rem;
        color: #94a3b8;
        margin: 0.5rem 0 0.2rem;
      }

      .star-rating {
        display: flex;
        align-items: center;
        gap: 0.15rem;
      }

      .star-button {
        border: 0;
        background: transparent;
        padding: 0;
        margin: 0;
        cursor: pointer;
        font-size: 1.4rem;
        line-height: 1;
        color: #334155;
      }

      .star-button.full {
        color: #facc15;
      }

      .star-button.half {
        background: linear-gradient(90deg, #facc15 50%, #334155 50%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .rating-value {
        margin-top: 0.2rem;
        text-align: left;
        font-size: 0.72rem;
        color: #cbd5e1;
      }

      .review-actions {
        margin-top: 0.5rem;
        display: flex;
        align-items: center;
        gap: 0.45rem;
      }

      .save-review-button {
        border: 1px solid #0ea5e9;
        background: #0284c7;
        color: #f8fafc;
        border-radius: 0.5rem;
        padding: 0.35rem 0.6rem;
        font-size: 0.78rem;
        cursor: pointer;
      }

      .review-status {
        font-size: 0.72rem;
        color: #93c5fd;
      }

      .auth-overlay {
        position: fixed;
        inset: 0;
        z-index: 120;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        background: rgba(2, 6, 23, 0.9);
      }

      .auth-overlay[hidden] {
        display: none;
      }

      .auth-card {
        width: min(92vw, 360px);
        border: 1px solid #334155;
        border-radius: 0.9rem;
        padding: 0.9rem;
        background: #0f172a;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.45);
        text-align: left;
      }

      .auth-card h2 {
        margin: 0 0 0.45rem;
        font-size: 1rem;
      }

      .auth-help {
        margin: 0;
        color: #94a3b8;
        font-size: 0.77rem;
      }

      .auth-field-label {
        display: block;
        margin: 0.65rem 0 0.2rem;
        color: #94a3b8;
        font-size: 0.75rem;
      }

      .auth-card input[type="text"],
      .auth-card input[type="file"] {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #334155;
        border-radius: 0.5rem;
        padding: 0.48rem;
        background: #111827;
        color: #e2e8f0;
        font-size: 0.82rem;
      }

      .auth-actions {
        margin-top: 0.7rem;
        display: flex;
        gap: 0.45rem;
      }

      .auth-button {
        border: 1px solid #334155;
        background: #1e293b;
        color: #f8fafc;
        border-radius: 0.5rem;
        padding: 0.4rem 0.6rem;
        font-size: 0.78rem;
        cursor: pointer;
      }

      .auth-button.primary {
        border-color: #0ea5e9;
        background: #0284c7;
      }

      .auth-status {
        margin: 0.5rem 0 0;
        min-height: 1rem;
        color: #93c5fd;
        font-size: 0.74rem;
      }

      .profile-hub {
        position: fixed;
        right: 0.65rem;
        bottom: 0.7rem;
        z-index: 80;
      }

      .profile-hub[hidden] {
        display: none;
      }

      .profile-avatar-button {
        width: 54px;
        height: 54px;
        border-radius: 999px;
        border: 2px solid #38bdf8;
        padding: 0;
        background: #0f172a;
        overflow: hidden;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        cursor: pointer;
      }

      .profile-avatar-button img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .profile-menu {
        position: absolute;
        right: 0;
        bottom: 62px;
        min-width: 180px;
        border: 1px solid #334155;
        border-radius: 0.7rem;
        background: #0f172a;
        padding: 0.45rem;
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }

      .profile-menu[hidden] {
        display: none;
      }

      .profile-menu button {
        border: 1px solid #334155;
        border-radius: 0.45rem;
        background: #1e293b;
        color: #f8fafc;
        padding: 0.34rem 0.45rem;
        text-align: left;
        font-size: 0.76rem;
        cursor: pointer;
      }

      .profile-menu-user {
        margin: 0;
        color: #7dd3fc;
        font-size: 0.74rem;
      }

      .profile-menu input[type="file"] {
        display: none;
      }

      .reviews-view {
        text-align: left;
      }

      .reviews-view[hidden] {
        display: none;
      }

      .reviews-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.55rem;
      }

      .reviews-header h2 {
        margin: 0;
        font-size: 1rem;
      }

      .back-button {
        border: 1px solid #334155;
        border-radius: 0.5rem;
        background: #1e293b;
        color: #f8fafc;
        padding: 0.3rem 0.55rem;
        font-size: 0.76rem;
        cursor: pointer;
      }

      .my-reviews-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
      }

      .my-review-item {
        border: 1px solid #334155;
        border-radius: 0.6rem;
        padding: 0.5rem;
        background: #0f172a;
      }

      .my-review-item p {
        margin: 0.1rem 0;
        font-size: 0.8rem;
      }

      .my-review-meta {
        color: #7dd3fc;
      }

      .my-review-date {
        color: #94a3b8;
        font-size: 0.72rem;
      }

      .bubble-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 60;
      }

      .review-bubble {
        position: absolute;
        max-width: min(45vw, 220px);
        padding: 0.55rem 0.65rem;
        border-radius: 0.9rem;
        border: 1px solid rgba(56, 189, 248, 0.45);
        background: rgba(15, 23, 42, 0.58);
        color: #e2e8f0;
        font-size: 0.72rem;
        line-height: 1.35;
        pointer-events: auto;
        user-select: none;
        touch-action: none;
        cursor: grab;
        animation: floatBubble var(--duration, 22s) ease-in-out var(--delay, 0s) infinite alternate;
      }

      .review-bubble.song-review {
        border-color: rgba(56, 189, 248, 0.45);
        background: rgba(15, 23, 42, 0.58);
      }

      .review-bubble.album-review {
        border-color: rgba(251, 191, 36, 0.55);
        background: rgba(44, 27, 4, 0.6);
      }

      .review-bubble.dragging {
        cursor: grabbing;
        animation-play-state: paused;
      }

      .review-bubble-summary {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 0.25rem 0.4rem;
        flex-wrap: wrap;
      }

      .review-avatar-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.28rem;
        border-radius: 999px;
        padding: 0.1rem 0.38rem 0.1rem 0.12rem;
        border: 1px solid rgba(125, 211, 252, 0.7);
        background: rgba(15, 23, 42, 0.75);
      }

      .review-bubble.album-review .review-avatar-badge {
        border-color: rgba(251, 191, 36, 0.8);
        background: rgba(69, 26, 3, 0.58);
      }

      .review-avatar-image {
        width: 24px;
        height: 24px;
        border-radius: 999px;
        object-fit: cover;
        border: 1px solid rgba(148, 163, 184, 0.45);
      }

      .review-avatar-score {
        color: #f8fafc;
        font-size: 0.67rem;
        white-space: nowrap;
      }

      .review-bubble-name {
        color: #7dd3fc;
        font-size: 0.68rem;
        margin: 0;
      }

      .review-bubble.album-review .review-bubble-name {
        color: #fbbf24;
      }

      .review-bubble-scope {
        margin: 0;
        font-size: 0.62rem;
        color: #cbd5e1;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .review-bubble-rating {
        margin: 0;
        color: #facc15;
      }

      .review-bubble-text {
        display: none;
        margin-top: 0.35rem;
      }

      .review-bubble.expanded {
        background: rgba(15, 23, 42, 0.8);
      }

      .review-bubble.album-review.expanded {
        background: rgba(44, 27, 4, 0.82);
      }

      .review-bubble.expanded .review-bubble-text {
        display: block;
      }

      .review-history-list {
        margin: 0.4rem 0 0;
        padding-left: 1rem;
        max-height: 150px;
        overflow: auto;
      }

      .review-history-item + .review-history-item {
        margin-top: 0.38rem;
      }

      .review-history-meta {
        margin: 0;
        font-size: 0.66rem;
        color: #93c5fd;
      }

      .review-history-text {
        margin: 0.1rem 0 0;
      }

      @keyframes floatBubble {
        0% {
          transform: translate(0, 0) rotate(-1deg);
        }
        33% {
          transform: translate(calc(var(--drift-x, 32px) * 0.6), calc(var(--drift-y, -26px) * 0.6)) rotate(1deg);
        }
        66% {
          transform: translate(calc(var(--drift-x, 32px) * 0.95), calc(var(--drift-y, -26px) * 0.95)) rotate(-0.8deg);
        }
        100% {
          transform: translate(var(--drift-x, 32px), var(--drift-y, -26px)) rotate(1.2deg);
        }
      }

      .albums {
        margin-top: 1.5rem;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0.4rem;
        text-align: left;
      }

      .album-card {
        border-radius: 0.75rem;
        overflow: hidden;
        background: #0f172a;
        border: 1px solid #334155;
        transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
        transform-origin: center center;
      }

      .album-card.expanded {
        border-color: #7dd3fc;
        box-shadow: 0 0 0 2px rgba(125, 211, 252, 0.18);
        transform: scale(1.02);
        grid-column: 1 / -1;
      }

      .cover-button {
        width: 100%;
        padding: 0;
        border: 0;
        background: transparent;
        display: block;
        cursor: pointer;
      }

      .cover-button img {
        width: 100%;
        aspect-ratio: 1 / 1;
        display: block;
        object-fit: cover;
      }

      .cover-button img.not-owned {
        filter: grayscale(1) brightness(0.72);
      }

      .album-details {
        max-height: 0;
        opacity: 0;
        transform: translateY(-6px);
        overflow: hidden;
        transition: max-height 220ms ease, opacity 220ms ease, transform 220ms ease;
      }

      .album-card.expanded .album-details {
        max-height: 360px;
        opacity: 1;
        transform: translateY(0);
        padding: 0.6rem 0.65rem 0.75rem;
      }

      .album-card h2 {
        margin: 0 0 0.25rem;
        font-size: 0.9rem;
      }

      .meta {
        color: #94a3b8;
        font-size: 0.82rem;
      }

      .notes {
        margin-top: 0.35rem;
        font-size: 0.82rem;
      }

      .gifted-by {
        margin-top: 0.28rem;
        font-size: 0.78rem;
        color: #cbd5e1;
      }

      .album-links {
        margin-top: 0.45rem;
        display: flex;
        align-items: center;
        gap: 0.45rem;
        flex-wrap: wrap;
      }

      .album-links .meta {
        margin: 0;
      }

      .album-action-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #22c55e;
        background: #166534;
        color: #f0fdf4;
        border-radius: 0.45rem;
        padding: 0.28rem 0.5rem;
        font-size: 0.74rem;
        text-decoration: none;
      }

      .track-list {
        margin: 0.5rem 0 0;
        padding-left: 1.05rem;
        color: #cbd5e1;
        font-size: 0.8rem;
      }

      .track-list li + li {
        margin-top: 0.15rem;
      }

      .guest-label {
        margin: 0 0 0.45rem;
        color: #fbbf24;
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

    </style>
  </head>
  <body>
    <section id="auth-overlay" class="auth-overlay">
      <div class="auth-card">
        <h2>Entrar o registrarte</h2>
        <p class="auth-help">Escribe tu nombre. Si ya existe, entraras a ese perfil sin contrasena.</p>
        <label class="auth-field-label" for="auth-name">Nombre</label>
        <input id="auth-name" type="text" placeholder="Tu nombre" />
        <label class="auth-field-label" for="auth-photo">Foto (solo al crear usuario)</label>
        <input id="auth-photo" type="file" accept="image/*" />
        <div class="auth-actions">
          <button id="auth-login" class="auth-button" type="button">Entrar</button>
          <button id="auth-register" class="auth-button primary" type="button">Crear usuario</button>
        </div>
        <p id="auth-status" class="auth-status"></p>
      </div>
    </section>

    <section id="now-playing" class="now-playing" hidden>
      <button id="now-playing-toggle" class="now-playing-toggle" type="button" aria-expanded="false" aria-controls="review-panel">
        <img id="now-playing-cover" src="" alt="Currently playing album cover" />
        <div class="now-playing-copy">
          <p class="now-playing-label">Reproduciendo ahora</p>
          <p id="now-playing-text" class="now-playing-text"></p>
          <p class="now-playing-hint">Toca para calificar</p>
        </div>
      </button>

      <div id="review-panel" class="review-panel" hidden>
        <label for="album-review">Reseña</label>
        <textarea id="album-review" placeholder="Escribe tu reseña"></textarea>

        <p class="rating-label">Puntuacion</p>
        <div id="star-rating" class="star-rating" role="radiogroup" aria-label="Puntuacion del album">
          <button type="button" class="star-button" data-star="1" aria-label="1 star">★</button>
          <button type="button" class="star-button" data-star="2" aria-label="2 stars">★</button>
          <button type="button" class="star-button" data-star="3" aria-label="3 stars">★</button>
          <button type="button" class="star-button" data-star="4" aria-label="4 stars">★</button>
          <button type="button" class="star-button" data-star="5" aria-label="5 stars">★</button>
        </div>
        <p id="rating-value" class="rating-value">Puntuacion: 0 / 5</p>
        <div class="review-actions">
          <button id="save-review" class="save-review-button" type="button">Guardar reseña</button>
          <p id="review-status" class="review-status"></p>
        </div>
      </div>
    </section>
    <section id="bubble-layer" class="bubble-layer" aria-hidden="true"></section>

    <section id="profile-hub" class="profile-hub" hidden>
      <div id="profile-menu" class="profile-menu" hidden>
        <p id="profile-menu-user" class="profile-menu-user"></p>
        <button id="change-photo" type="button">Cambiar foto</button>
        <input id="change-photo-input" type="file" accept="image/*" />
        <button id="view-reviews" type="button">Ver reseñas</button>
        <button id="logout-profile" type="button">Cerrar sesion</button>
      </div>
      <button id="profile-avatar-button" class="profile-avatar-button" type="button" aria-expanded="false" aria-controls="profile-menu">
        <img id="profile-avatar" src="./mi%20dise%C3%B1o.png" alt="Foto de perfil" />
      </button>
    </section>

    <main>
      <section id="main-view">
        <p class="guest-label">invitados</p>
        <h1 id="title">Listening Party</h1>
        <p id="message">Bienvenido a la pagina principal.</p>
        <section id="albums" class="albums" aria-live="polite"></section>
      </section>
      <section id="reviews-view" class="reviews-view" hidden>
        <div class="reviews-header">
          <h2>Mis reseñas</h2>
          <button id="reviews-back" class="back-button" type="button">Volver</button>
        </div>
        <ul id="my-reviews-list" class="my-reviews-list"></ul>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
