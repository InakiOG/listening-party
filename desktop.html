<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listening Party — Display</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --ui-scale: 1;
        --active-user-size: calc(48px * var(--ui-scale));
        --review-bubble-max: calc(240px * var(--ui-scale));
        --review-avatar-size: calc(26px * var(--ui-scale));
        --liker-size: calc(20px * var(--ui-scale));
        --fun-fact-max: calc(210px * var(--ui-scale));
      }

      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        overflow: hidden;
        background: #0f172a;
        color: #e2e8f0;
      }

      html {
        font-size: calc(16px * var(--ui-scale));
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ── Ambient background ── */
      #ambient-bg {
        position: fixed;
        inset: -15%;
        z-index: 1;
        pointer-events: none;
        opacity: 0;
        transition: opacity 1.6s ease;
        background-size: cover;
        background-position: center;
        filter: blur(80px) brightness(0.28) saturate(2.6);
      }

      /* ── Bubble layers ── */
      #bubble-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 60;
      }

      #active-users-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 55;
      }

      /* ── Active user bubbles ── */
      .active-user-bubble {
        position: absolute;
        width: var(--active-user-size);
        height: var(--active-user-size);
        border-radius: 999px;
        border: calc(2px * var(--ui-scale)) solid rgba(226, 232, 240, 0.82);
        overflow: hidden;
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.45);
        pointer-events: auto;
        user-select: none;
        touch-action: none;
        cursor: default;
      }

      .active-user-bubble img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .active-user-letter {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #f8fafc;
        font-size: 1.1rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      /* ── Review bubbles ── */
      .review-bubble {
        position: absolute;
        max-width: var(--review-bubble-max);
        padding: 0.65rem 0.75rem;
        border-radius: 0.9rem;
        border: 1px solid rgba(56, 189, 248, 0.45);
        background: rgba(15, 23, 42, 0.82);
        color: #e2e8f0;
        font-size: 0.78rem;
        line-height: 1.4;
        pointer-events: auto;
        user-select: none;
        touch-action: none;
        cursor: default;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .review-bubble.song-review {
        border-color: rgba(56, 189, 248, 0.45);
        background: rgba(15, 23, 42, 0.82);
      }

      .review-bubble.album-review {
        border-color: rgba(251, 191, 36, 0.55);
        background: rgba(44, 27, 4, 0.82);
      }

      .review-bubble.past-reviews-bubble {
        border-color: rgba(167, 139, 250, 0.5);
        background: rgba(30, 15, 50, 0.82);
      }

      /* ── Bubble summary (avatar + score) ── */
      .review-bubble-summary {
        display: flex;
        align-items: center;
        gap: 0.3rem 0.45rem;
        flex-wrap: wrap;
        margin-bottom: 0.45rem;
      }

      .review-avatar-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.28rem;
        border-radius: 999px;
        padding: 0.1rem 0.38rem 0.1rem 0.12rem;
        border: 1px solid rgba(125, 211, 252, 0.7);
        background: rgba(15, 23, 42, 0.75);
      }

      .review-bubble.album-review .review-avatar-badge {
        border-color: rgba(251, 191, 36, 0.8);
        background: rgba(69, 26, 3, 0.58);
      }

      .review-avatar-image {
        width: var(--review-avatar-size);
        height: var(--review-avatar-size);
        border-radius: 999px;
        object-fit: cover;
        border: 1px solid rgba(148, 163, 184, 0.45);
      }

      .review-avatar-name {
        color: #f8fafc;
        font-size: 0.72rem;
        font-weight: 600;
        white-space: nowrap;
      }

      .review-bubble-name {
        color: #7dd3fc;
        font-size: 0.72rem;
        margin: 0;
        font-weight: 600;
      }

      .review-bubble.album-review .review-bubble-name {
        color: #fbbf24;
      }

      .review-bubble-scope {
        margin: 0;
        font-size: 0.62rem;
        color: #cbd5e1;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      /* ── Star rating ── */
      .review-stars {
        display: flex;
        align-items: center;
        gap: 0.06rem;
        margin: 0.3rem 0 0.2rem;
        font-size: 1rem;
        line-height: 1;
      }

      .star { color: #334155; }
      .star.full { color: #facc15; }
      .star.half {
        background: linear-gradient(90deg, #facc15 50%, #334155 50%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .review-score-text {
        margin-left: 0.3rem;
        font-size: 0.68rem;
        color: #94a3b8;
        white-space: nowrap;
      }

      /* ── Review text ── */
      .review-history-list {
        margin: 0.35rem 0 0;
        padding-left: 1rem;
        max-height: 110px;
        overflow: hidden;
      }

      .review-history-item + .review-history-item { margin-top: 0.35rem; }

      .review-history-meta {
        margin: 0;
        font-size: 0.64rem;
        color: #93c5fd;
      }

      .review-bubble.album-review .review-history-meta { color: #fcd34d; }

      .review-history-text {
        margin: 0.08rem 0 0;
        font-size: 0.74rem;
        color: #cbd5e1;
      }

      /* ── Likes ── */
      .review-likes-section {
        display: flex;
        align-items: center;
        gap: 0.28rem;
        margin-top: 0.5rem;
        flex-wrap: wrap;
      }

      .review-bubble-hearts {
        font-size: 0.75rem;
        line-height: 1.2;
        margin-top: 0.2rem;
        letter-spacing: 0.05em;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.05rem;
        width: 100%;
      }

      .review-hearts-more {
        font-size: 0.6rem;
        color: #94a3b8;
        margin-left: 0.1rem;
      }

      .liker-avatar {
        width: var(--liker-size); height: var(--liker-size);
        border-radius: 999px;
        object-fit: cover;
        border: 1px solid rgba(148, 163, 184, 0.5);
        flex-shrink: 0;
      }

      .liker-initial {
        width: var(--liker-size); height: var(--liker-size);
        border-radius: 999px;
        background: rgba(100, 116, 139, 0.55);
        color: #e2e8f0;
        font-size: 0.6rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(148, 163, 184, 0.45);
        flex-shrink: 0;
      }

      /* Past reviews bubble */
      .past-reviews-title { color: #c084fc !important; }
      .past-reviews-count {
        font-size: 0.64rem;
        color: #a78bfa;
        background: rgba(167, 139, 250, 0.18);
        border-radius: 999px;
        padding: 0.05rem 0.35rem;
      }
      .past-review-author { color: #c084fc; font-weight: 600; }

      /* ── IDLE STATE ── */
      #idle-screen {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        opacity: 1;
        transition: opacity 0.5s ease;
      }

      #idle-screen.hidden {
        opacity: 0;
        pointer-events: none;
        position: absolute;
      }

      .idle-logo-wrap {
        position: relative;
        width: clamp(200px, 28vw, 380px);
      }

      .idle-logo {
        display: block;
        width: 100%;
        height: auto;
        object-fit: contain;
      }

      .idle-logo-text {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        font-size: clamp(1.2rem, 2.4vw, 2.2rem);
        font-weight: 900;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #f8fafc;
        -webkit-text-stroke: 2px #000;
        text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
        white-space: nowrap;
        pointer-events: none;
        user-select: none;
      }

      .idle-title {
        margin: 0;
        font-size: clamp(1.4rem, 2.8vw, 2.8rem);
        font-weight: 700;
        letter-spacing: 0.05em;
        color: #94a3b8;
        text-transform: uppercase;
      }

      /* ── NOW PLAYING STATE ── */
      #playing-screen {
        position: absolute;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2.5rem;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.6s ease;
      }

      #playing-screen.visible {
        opacity: 1;
        pointer-events: auto;
        position: relative;
      }

      .cover-vinyl-wrap {
        position: relative;
        width: calc(var(--cover-size) + var(--cover-size) * 0.55);
        height: var(--cover-size);
        --cover-size: clamp(220px, 28vw, 380px);
        transform: translateX(4vw);
      }

      .cover-img {
        position: absolute;
        left: 0; top: 0;
        width: var(--cover-size);
        height: var(--cover-size);
        border-radius: 0.75rem;
        object-fit: cover;
        z-index: 3;
        box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      }

      .cover-img.arriving {
        animation: coverArrive 420ms cubic-bezier(0.22, 1.1, 0.36, 1) 200ms both;
      }

      @keyframes coverArrive {
        0%   { transform: scale(1.4) translateX(-20px); opacity: 0; }
        60%  { transform: scale(0.96); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }

      .vinyl-disc {
        --disc-color: #0b0b0b;
        position: absolute;
        top: 50%; right: calc(var(--cover-size) * 0.20);
        width: calc(var(--cover-size) * 0.95);
        height: calc(var(--cover-size) * 0.95);
        border-radius: 50%;
        transform: translateY(-50%);
        background:
          radial-gradient(circle at center, #0f172a 0 8%, #d4d4d8 8.5% 10.5%, transparent 11%),
          repeating-radial-gradient(circle at center, rgba(255,255,255,0.08) 0 2px, rgba(0,0,0,0.08) 2px 4px),
          radial-gradient(circle at 30% 22%, rgba(255,255,255,0.3), transparent 45%),
          var(--disc-color);
        box-shadow: 0 0 0 3px rgba(15,23,42,0.7), 0 12px 40px rgba(0,0,0,0.6);
        z-index: 1;
        animation: spinDisc 2.2s linear infinite;
      }

      .vinyl-disc.clear-vinyl {
        background:
          radial-gradient(circle at center, transparent 0 8%, rgba(226,232,240,0.9) 8.4% 10.6%, transparent 11%),
          radial-gradient(circle at center, transparent 0 74%, rgba(226,232,240,0.92) 74.4% 76.2%, transparent 76.6%),
          repeating-radial-gradient(circle at center, rgba(255,255,255,0.55) 0 1px, transparent 1px 5px),
          radial-gradient(circle at 28% 20%, rgba(255,255,255,0.32), transparent 47%),
          transparent;
        box-shadow: 0 0 0 2px rgba(255,255,255,0.95), 0 12px 40px rgba(0,0,0,0.4);
      }

      .vinyl-disc.cd-disc {
        background:
          radial-gradient(circle at center, transparent 0 8%, rgba(220,225,235,0.95) 8.5% 11.5%, transparent 12%),
          radial-gradient(circle at center, transparent 0 42%, rgba(148,163,184,0.22) 42.5% 43.5%, transparent 44%),
          conic-gradient(from 10deg, rgba(255,170,170,0.45), rgba(255,240,160,0.45), rgba(170,255,215,0.45), rgba(170,210,255,0.45), rgba(220,170,255,0.45), rgba(255,170,170,0.45)),
          radial-gradient(circle at 28% 20%, rgba(255,255,255,0.52), transparent 46%),
          linear-gradient(145deg, #d8e1ea, #a8b4c3 35%, #e6edf6 65%, #95a1b0);
      }

      .vinyl-disc.secondary {
        right: calc(var(--cover-size) * 0.02);
        transform: translateY(-50%) scale(0.92);
        z-index: 0;
        opacity: 0;
        animation: spinDiscSecondary 2.9s linear infinite reverse;
        transition: opacity 0.4s ease;
      }

      .vinyl-disc.secondary.visible { opacity: 0.9; }

      @keyframes spinDisc {
        from { transform: translateY(-50%) rotate(0deg); }
        to   { transform: translateY(-50%) rotate(360deg); }
      }

      @keyframes spinDiscSecondary {
        from { transform: translateY(-50%) scale(0.92) rotate(0deg); }
        to   { transform: translateY(-50%) scale(0.92) rotate(360deg); }
      }

      .track-info {
        text-align: center;
        max-width: calc(var(--cover-size) + var(--cover-size) * 0.55);
      }

      .track-label {
        margin: 0 0 0.4rem;
        font-size: clamp(0.65rem, 1vw, 0.85rem);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #7dd3fc;
      }

      .track-title {
        margin: 0 0 0.3rem;
        font-size: clamp(1.3rem, 2.6vw, 2.4rem);
        font-weight: 700;
        color: #f8fafc;
        line-height: 1.2;
      }

      .track-artist {
        margin: 0 0 0.25rem;
        font-size: clamp(1rem, 1.8vw, 1.6rem);
        font-weight: 400;
        color: #94a3b8;
      }

      .track-song {
        margin: 0;
        font-size: clamp(0.85rem, 1.4vw, 1.2rem);
        color: #64748b;
        font-style: italic;
      }

      .track-song[hidden] { display: none; }

      .track-thanks {
        margin: 0.35rem 0 0;
        font-size: clamp(0.8rem, 1.2vw, 1rem);
        color: #94a3b8;
        font-style: italic;
      }

      .track-thanks[hidden] { display: none; }

      /* ── Fullscreen button ── */
      #fs-btn {
        position: fixed;
        top: 1rem; right: 1rem;
        z-index: 100;
        border: 1px solid rgba(148, 163, 184, 0.3);
        background: rgba(15, 23, 42, 0.55);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        color: #94a3b8;
        border-radius: 0.5rem;
        padding: 0.35rem 0.55rem;
        font-size: 1rem;
        line-height: 1;
        cursor: pointer;
        transition: background 0.2s, color 0.2s;
      }

      #fs-btn:hover {
        background: rgba(30, 41, 59, 0.8);
        color: #e2e8f0;
      }

      /* ── Fun facts background layer ── */
      #fun-facts-layer {
        position: fixed;
        inset: 0;
        z-index: 3;
        pointer-events: none;
        overflow: hidden;
      }

      @keyframes bubble-float {
        0%   { transform: translateY(0)      translateX(0)              rotate(var(--rot)); opacity: 0; }
        8%   { opacity: 0.75; }
        35%  { transform: translateY(-32vh)  translateX(var(--sway-a))  rotate(var(--rot)); }
        65%  { transform: translateY(-62vh)  translateX(var(--sway-b))  rotate(var(--rot)); }
        92%  { opacity: 0.75; }
        100% { transform: translateY(-108vh) translateX(var(--sway-a))  rotate(var(--rot)); opacity: 0; }
      }

      .fun-fact {
        position: absolute;
        max-width: var(--fun-fact-max);
        color: rgba(226, 232, 240, 0.9);
        font-weight: 500;
        line-height: 1.55;
        text-align: center;
        opacity: 0;
        user-select: none;
        text-shadow: 0 1px 6px rgba(0, 0, 0, 0.7);
        animation: bubble-float var(--dur) ease-in-out var(--delay) infinite;
      }
    </style>
  </head>
  <body>
    <div id="ambient-bg" aria-hidden="true"></div>
    <div id="fun-facts-layer" aria-hidden="true"></div>
    <div id="active-users-layer" aria-hidden="true"></div>
    <div id="bubble-layer" aria-hidden="true"></div>

    <button id="fs-btn" title="Fullscreen" aria-label="Toggle fullscreen">⛶</button>

    <!-- Idle: shown when nothing is playing -->
    <div id="idle-screen">
      <div class="idle-logo-wrap">
        <img src="./graff.png" alt="Listening Party" class="idle-logo" />
        <span class="idle-logo-text">Listening Party</span>
      </div>
      <h1 class="idle-title">Listening Party</h1>
    </div>

    <!-- Playing: shown when a record is on -->
    <div id="playing-screen">
      <div class="cover-vinyl-wrap">
        <img id="np-cover" class="cover-img" src="" alt="Album cover" />
        <span id="np-disc" class="vinyl-disc"></span>
        <span id="np-disc-secondary" class="vinyl-disc secondary"></span>
      </div>
      <div class="track-info">
        <p class="track-label">Reproduciendo ahora</p>
        <p id="np-album" class="track-title"></p>
        <p id="np-artist" class="track-artist"></p>
        <p id="np-song" class="track-song" hidden></p>
        <p id="np-thanks" class="track-thanks" hidden></p>
      </div>
    </div>

    <script>
      /* ─────────────── helpers ─────────────── */
      function esc(s) {
        return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      const albumCoverFallbackUrl = './resources/404_album.png';
      const profileDefaultPhotoUrl = './resources/profile_default.jpg';

      let knownServerBootId = '';
      const nativeFetch = window.fetch.bind(window);
      window.fetch = async (...args) => {
        const response = await nativeFetch(...args);
        const bootId = response.headers.get('X-Server-Boot-Id') || '';
        if (bootId) {
          if (!knownServerBootId) {
            knownServerBootId = bootId;
          } else if (knownServerBootId !== bootId) {
            window.location.reload();
          }
        }
        return response;
      };

      function starsHtml(rating) {
        const r = Math.max(0, Math.min(5, Number(rating) || 0));
        let html = '';
        for (let i = 1; i <= 5; i++) {
          if (r >= i) html += '<span class="star full">★</span>';
          else if (r >= i - 0.5) html += '<span class="star half">★</span>';
          else html += '<span class="star">★</span>';
        }
        html += `<span class="review-score-text">${r.toFixed(1)}</span>`;
        return html;
      }

      function getReviewerKey(name) {
        return (name || 'Anonymous').trim().toLowerCase();
      }

      function groupReviewsByReviewer(reviews) {
        const grouped = new Map();
        for (const review of reviews) {
          const scope = review.scope === 'album' ? 'album' : 'song';
          const key = `${scope}::${getReviewerKey(review.name)}`;
          if (!grouped.has(key)) {
            grouped.set(key, { key, scope, displayName: (review.name || 'Anonymous').trim(), reviews: [], reviewApiKey: review._reviewKey || '' });
          }
          const g = grouped.get(key);
          if (!g.reviewApiKey && review._reviewKey) g.reviewApiKey = review._reviewKey;
          g.reviews.push({ ...review, scope });
        }
        return Array.from(grouped.values()).map(g => {
          const sorted = g.reviews.slice().sort((a,b) => (Date.parse(a.createdAt)||0) - (Date.parse(b.createdAt)||0));
          const avg = sorted.length ? sorted.reduce((s,r) => s + Number(r.rating||0), 0) / sorted.length : 0;
          const allLikes = [];
          const seen = new Set();
          for (const r of sorted) {
            for (const l of (Array.isArray(r.likes) ? r.likes : [])) {
              const lk = String(l.name||'').toLowerCase();
              if (lk && !seen.has(lk)) { seen.add(lk); allLikes.push(l); }
            }
          }
          const photo = sorted.find(r => r.photoDataUrl)?.photoDataUrl || profileDefaultPhotoUrl;
          return { ...g, reviews: sorted, averageRating: avg, avatarUrl: photo, likes: allLikes };
        });
      }

      function formatDate(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        if (isNaN(d)) return '';
        return d.toLocaleString([], { month:'short', day:'2-digit', hour:'2-digit', minute:'2-digit' });
      }

      function computeDesktopScale() {
        const wScale = window.innerWidth / 1920;
        const hScale = window.innerHeight / 1080;
        return Math.max(0.72, Math.min(1.35, Math.min(wScale, hScale)));
      }

      function applyDesktopScale() {
        document.documentElement.style.setProperty('--ui-scale', computeDesktopScale().toFixed(3));
      }

      /* ─────────────── physics engine ─────────────── */
      const bubbleEntities = new Map();
      let physicsRaf = null;

      function spawnEntity(r) {
        const lw = window.innerWidth, lh = window.innerHeight;
        const m = r + 4;
        const x = m + Math.random() * Math.max(1, lw - 2*m);
        const y = m + Math.random() * Math.max(1, lh - 2*m);
        const angle = Math.random() * Math.PI * 2;
        const spd = 40 + Math.random() * 35;
        return { el: null, x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd, r, baseSpeed: spd };
      }

      function syncEntities() {
        const lw = window.innerWidth, lh = window.innerHeight;
        const seen = new Set();

        for (const el of document.querySelectorAll('#bubble-layer .review-bubble')) {
          const raw = el.dataset.reviewId ? decodeURIComponent(el.dataset.reviewId) : null;
          if (!raw) continue;
          const k = `r::${raw}`;
          seen.add(k);
          if (!bubbleEntities.has(k)) bubbleEntities.set(k, spawnEntity(40));
          const e = bubbleEntities.get(k);
          e.el = el;
          // Measure actual rendered size so physics center == visual center
          const br = el.getBoundingClientRect();
          if (br.width > 0 && br.height > 0) {
            const hw = br.width  / 2;
            const hh = br.height / 2;
            const newR = Math.max(hw, hh);
            if (Math.abs(newR - e.r) > 1) {
              e.hw = hw; e.hh = hh; e.r = newR;
              e.x  = Math.max(newR, Math.min(lw - newR, e.x));
              e.y  = Math.max(newR, Math.min(lh - newR, e.y));
            } else {
              e.hw = hw; e.hh = hh;
            }
          }
          el.style.left = `${e.x - (e.hw || e.r)}px`;
          el.style.top  = `${e.y - (e.hh || e.r)}px`;
        }

        for (const el of document.querySelectorAll('#active-users-layer .active-user-bubble')) {
          const raw = el.dataset.userKey ? decodeURIComponent(el.dataset.userKey) : null;
          if (!raw) continue;
          const k = `u::${raw}`;
          seen.add(k);
          if (!bubbleEntities.has(k)) bubbleEntities.set(k, spawnEntity(24));
          const e = bubbleEntities.get(k);
          e.el = el;
          el.style.left = `${e.x - e.r}px`;
          el.style.top  = `${e.y - e.r}px`;
        }

        for (const k of bubbleEntities.keys()) {
          if (!seen.has(k)) bubbleEntities.delete(k);
        }

        startPhysics();
      }

      // Returns exact per-shape geometry for the cover rect + disc circle, or null when idle.
      function getCenterObstacle() {
        if (!playScreen.classList.contains('visible')) return null;
        const wrap = playScreen.querySelector('.cover-vinyl-wrap');
        if (!wrap) return null;
        const r = wrap.getBoundingClientRect();
        if (r.width === 0 || r.height === 0) return null;

        // Cover size is the wrap height (wrap height === --cover-size).
        const S = r.height;

        // Cover: square on the left side of the wrap.
        const coverRect = { left: r.left, top: r.top, right: r.left + S, bottom: r.bottom };

        // Disc: position: absolute; top:50%; right: S*0.20; width/height: S*0.95
        const discDiam = S * 0.95;
        const discR    = discDiam / 2;
        const discCx   = r.right - S * 0.20 - discR;  // right edge minus its own right offset
        const discCy   = r.top + S / 2;               // vertically centered in wrap

        return { coverRect, disc: { cx: discCx, cy: discCy, r: discR } };
      }

      // Unified AABB-vs-compound-obstacle: cover rect + disc circle.
      // Uses max-penetration selection so the overlap zone never double-pushes.
      function bounceOffObstacle(e, obstacle) {
        const { coverRect, disc } = obstacle;
        const hw = e.hw || e.r, hh = e.hh || e.r;
        const bL = e.x - hw, bR = e.x + hw, bT = e.y - hh, bB = e.y + hh;

        // ── AABB vs disc circle ─────────────────────────────────────────
        // Closest point on bubble AABB to disc center
        const cpDx = Math.max(bL, Math.min(disc.cx, bR));
        const cpDy = Math.max(bT, Math.min(disc.cy, bB));
        const dDx  = cpDx - disc.cx, dDy = cpDy - disc.cy;
        const distD = Math.hypot(dDx, dDy) || 0.001;
        const penD  = disc.r - distD; // positive = bubble overlaps disc

        // ── AABB vs cover rect ──────────────────────────────────────────
        const ovL = bR - coverRect.left, ovR = coverRect.right - bL;
        const ovT = bB - coverRect.top,  ovB = coverRect.bottom - bT;
        const penC = (ovL > 0 && ovR > 0 && ovT > 0 && ovB > 0)
          ? Math.min(ovL, ovR, ovT, ovB) : 0;

        // Apply only the deeper penetration to prevent oscillation in the overlap zone
        if (penD > 0 && penD >= penC) {
          // Push along disc-center → bubble-center axis
          const ecx = e.x - disc.cx, ecy = e.y - disc.cy;
          const ecd = Math.hypot(ecx, ecy) || 0.001;
          const nx = ecx / ecd, ny = ecy / ecd;
          e.x += nx * penD; e.y += ny * penD;
          const dot = e.vx * nx + e.vy * ny;
          if (dot < 0) { e.vx -= 2 * dot * nx; e.vy -= 2 * dot * ny; }
        } else if (penC > 0) {
          // Push along minimum-overlap axis of the cover rect
          let nx = 0, ny = 0;
          const m = Math.min(ovL, ovR, ovT, ovB);
          if (m === ovL) nx = -1;      // bubble came from the left  → push left
          else if (m === ovR) nx =  1; // bubble came from the right → push right
          else if (m === ovT) ny = -1; // bubble came from above     → push up
          else ny =  1;                // bubble came from below     → push down
          e.x += nx * penC; e.y += ny * penC;
          const dot = e.vx * nx + e.vy * ny;
          if (dot < 0) { e.vx -= 2 * dot * nx; e.vy -= 2 * dot * ny; }
        }
      }

      function stepPhysics(dt) {
        const lw = window.innerWidth, lh = window.innerHeight;
        const active = [...bubbleEntities.values()].filter(e => e.el);
        const obstacle = getCenterObstacle();

        for (const e of active) {
          const hw = e.hw || e.r, hh = e.hh || e.r;
          e.x += e.vx * dt;
          e.y += e.vy * dt;
          if (e.x - hw < 0)  { e.x = hw;      e.vx =  Math.abs(e.vx); }
          if (e.x + hw > lw) { e.x = lw - hw; e.vx = -Math.abs(e.vx); }
          if (e.y - hh < 0)  { e.y = hh;      e.vy =  Math.abs(e.vy); }
          if (e.y + hh > lh) { e.y = lh - hh; e.vy = -Math.abs(e.vy); }

          if (obstacle) bounceOffObstacle(e, obstacle);

          const spd = Math.hypot(e.vx, e.vy);
          if (spd > e.baseSpeed && spd > 0.1) {
            const s = (e.baseSpeed + (spd - e.baseSpeed) * Math.exp(-1.8 * dt)) / spd;
            e.vx *= s; e.vy *= s;
          }

          e.el.style.left = `${e.x - hw}px`;
          e.el.style.top  = `${e.y - hh}px`;
        }

        for (let i = 0; i < active.length; i++) {
          for (let j = i + 1; j < active.length; j++) {
            const a = active[i], b = active[j];
            const ahw = a.hw || a.r, ahh = a.hh || a.r;
            const bhw = b.hw || b.r, bhh = b.hh || b.r;
            const adx = Math.abs(b.x - a.x), ady = Math.abs(b.y - a.y);
            const minX = ahw + bhw, minY = ahh + bhh;
            if (adx >= minX || ady >= minY) continue;
            // Resolve along the axis with least penetration
            const ovX = minX - adx, ovY = minY - ady;
            let nx = 0, ny = 0, ov = 0;
            if (ovX <= ovY) {
              nx = b.x > a.x ? 1 : -1;
              ov = ovX * 0.5;
            } else {
              ny = b.y > a.y ? 1 : -1;
              ov = ovY * 0.5;
            }
            a.x -= nx*ov; a.y -= ny*ov;
            b.x += nx*ov; b.y += ny*ov;
            const imp = (a.vx-b.vx)*nx + (a.vy-b.vy)*ny;
            if (imp > 0) {
              a.vx -= imp*nx; a.vy -= imp*ny;
              b.vx += imp*nx; b.vy += imp*ny;
            }
            a.el.style.left = `${a.x - ahw}px`; a.el.style.top = `${a.y - ahh}px`;
            b.el.style.left = `${b.x - bhw}px`; b.el.style.top = `${b.y - bhh}px`;
          }
        }
      }

      function startPhysics() {
        if (physicsRaf) return;
        let prev = performance.now();
        function tick(now) {
          physicsRaf = requestAnimationFrame(tick);
          stepPhysics(Math.min((now - prev) / 1000, 0.05));
          prev = now;
        }
        physicsRaf = requestAnimationFrame(tick);
      }

      /* ─────────────── render bubbles ─────────────── */
      const BUBBLE_COLORS = ['#ef4444','#f97316','#eab308','#22c55e','#06b6d4','#3b82f6','#a855f7','#ec4899'];
      const colorCache = new Map();

      function userColor(name) {
        const k = (name||'').toLowerCase();
        if (!colorCache.has(k)) colorCache.set(k, BUBBLE_COLORS[Math.floor(Math.random()*BUBBLE_COLORS.length)]);
        return colorCache.get(k);
      }

      let lastUserSig = '', lastReviewSig = '';

      function renderUsers(users) {
        const layer = document.getElementById('active-users-layer');
        const sig = JSON.stringify(users.map(u => u.name));
        if (sig === lastUserSig) return;
        lastUserSig = sig;

        layer.innerHTML = users.slice(0, 14).map((user, i) => {
          const key = encodeURIComponent((user.name||`user${i}`).toLowerCase());
          const name = esc(user.name || 'Usuario');
          const photo = String(user.photoDataUrl || '').trim() || profileDefaultPhotoUrl;
          const inner = `<img src="${esc(photo)}" alt="${name}" loading="lazy" onerror="this.onerror=null;this.src='${profileDefaultPhotoUrl}'" />`;
          return `<article class="active-user-bubble" data-user-key="${key}" title="${name}" style="left:0;top:0;">${inner}</article>`;
        }).join('');

        syncEntities();
      }

      function renderReviews(currentReviews, pastReviews) {
        const layer = document.getElementById('bubble-layer');
        const sig = JSON.stringify(currentReviews) + JSON.stringify(pastReviews);
        if (sig === lastReviewSig) return;
        lastReviewSig = sig;

        const groups = groupReviewsByReviewer(currentReviews).slice(-8);

        const currentHtml = groups.map(g => {
          const id = encodeURIComponent(g.key);
          const name = esc(g.displayName);
          const scopeLabel = g.scope === 'album' ? 'Album' : 'Cancion';
          const bubbleClass = g.scope === 'album' ? 'album-review' : 'song-review';

          // Header: avatar badge or plain name
          const headerHtml = g.avatarUrl
            ? `<div class="review-avatar-badge">
                 <img class="review-avatar-image" src="${esc(g.avatarUrl)}" alt="${name}" loading="lazy" />
                 <span class="review-avatar-name">${name}</span>
               </div>
               <span class="review-bubble-scope">${scopeLabel}</span>`

               <span class="review-bubble-scope">${scopeLabel}</span>`;

          // Stars
          const starsRow = `<div class="review-stars">${starsHtml(g.averageRating)}</div>`;

          // Review texts
          const historyHtml = g.reviews.map(r => {
            const text = String(r.text||'').trim();
            const textRow = text ? `<p class="review-history-text">${esc(text)}</p>` : '';
            const d = formatDate(r.createdAt);
            return `<li class="review-history-item">
              <p class="review-history-meta">${d ? esc(d) + ' · ' : ''}${Number(r.rating||0).toFixed(1)}/5</p>

            </li>`;
          }).join('');

          // Hearts strip
          const heartsStrip = g.likes.length
            ? `<div class="review-bubble-hearts">${g.likes.slice(0,7).map(()=>'❤️').join('')}${g.likes.length>7?`<span class="review-hearts-more">+${g.likes.length-7}</span>`:''}</div>`
            : '';

          // Liker photos
          const likerPhotos = g.likes.map(l => {
            const ln = esc(String(l.name||'?'));
            const likerPhoto = String(l.photoDataUrl || '').trim() || profileDefaultPhotoUrl;
            return `<img class="liker-avatar" src="${esc(likerPhoto)}" alt="${ln}" title="${ln}" loading="lazy" onerror="this.onerror=null;this.src='${profileDefaultPhotoUrl}'" />`;
          }).join('');
          const likesSection = g.likes.length
            ? `<div class="review-likes-section">${likerPhotos}</div>`
            : '';

          return `<article class="review-bubble ${bubbleClass}" data-review-id="${id}" style="left:0;top:0;">
            <div class="review-bubble-summary">${headerHtml}</div>
            ${starsRow}
            <ol class="review-history-list">${historyHtml}</ol>
            ${heartsStrip}
            ${likesSection}
          </article>`;
        }).join('');

        let pastHtml = '';
        if (pastReviews.length) {
          const sorted = [...pastReviews].sort((a,b) => (Date.parse(a.createdAt)||0)-(Date.parse(b.createdAt)||0));
          const pastItems = sorted.map(r => {
            const author = esc(String(r.name||'Anonymous').trim());
            const text = String(r.text||'').trim();
            const scope = r.scope === 'album' ? 'Album' : 'Canción';
            return `<li class="review-history-item">
              <p class="review-history-meta"><span class="past-review-author">${author}</span> · ${scope} · ${Number(r.rating||0).toFixed(1)}/5</p>
              ${text ? `<p class="review-history-text">${esc(text)}</p>` : ''}
            </li>`;
          }).join('');
          pastHtml = `<article class="review-bubble past-reviews-bubble" data-review-id="${encodeURIComponent('past-reviews')}" style="left:0;top:0;">
            <div class="review-bubble-summary">
              <span class="review-bubble-name past-reviews-title">Anteriores</span>
              <span class="past-reviews-count">${pastReviews.length}</span>
            </div>
            <ol class="review-history-list">${pastItems}</ol>
          </article>`;
        }

        layer.innerHTML = pastHtml + currentHtml;
        syncEntities();
      }

      /* ─────────────── data fetching ─────────────── */
      let currentNowPlaying = null;
      let lastNpSig = '';

      function getSongKey(np) {
        if (!np?.albumTitle || !np?.songTitle) return '';
        return `${np.albumTitle}::${np.songTitle}`;
      }

      function getAlbumKey(np) {
        if (!np?.albumTitle) return '';
        const parts = [np.albumArtist, np.albumTitle].map(v => String(v||'').trim()).filter(Boolean);
        return `album::${parts.join('::')}`;
      }

      async function fetchReviews(key) {
        try {
          const r = await fetch(`/api/reviews?songKey=${encodeURIComponent(key)}&t=${Date.now()}`, { cache: 'no-store' });
          if (!r.ok) throw new Error();
          const p = await r.json();
          return Array.isArray(p.reviews) ? p.reviews : [];
        } catch {
          return [];
        }
      }

      async function pollReviews() {
        const np = currentNowPlaying;
        if (!np?.albumTitle) { renderReviews([], []); return; }

        const scope = np.reviewScope === 'album' ? 'album' : 'song';
        const songKey = getSongKey(np);
        const albumKey = getAlbumKey(np);

        // Fetch both album and current song reviews to capture reviews from individual song selections in album mode
        const [albumRevs, songRevs] = await Promise.all([
          fetchReviews(albumKey),
          songKey ? fetchReviews(songKey) : Promise.resolve([])
        ]);

        const all = [
          ...albumRevs.map(r => ({ ...r, scope: 'album', _reviewKey: albumKey })),
          ...songRevs.map(r => ({ ...r, scope: 'song', _reviewKey: songKey }))
        ];

        const partyId = np.partyId || null;
        const current = partyId ? all.filter(r => r.partyId === partyId) : all;
        const past    = partyId ? all.filter(r => r.partyId !== partyId) : [];

        renderReviews(current, past);
      }

      async function pollUsers() {
        try {
          const r = await fetch(`/api/users/active?t=${Date.now()}`, { cache: 'no-store' });
          if (!r.ok) throw new Error();
          const payload = await r.json();
          const users = Array.isArray(payload) ? payload : (Array.isArray(payload.users) ? payload.users : []);
          renderUsers(users);
        } catch {
          renderUsers([]);
        }
      }

      /* ─────────────── vinyl detection (mirrors app.js exactly) ─────────────── */
      const VINYL_COLOR_RULES = [
        { key: 'glow in the dark', color: '#16a34a', pattern: /\bglow[\s-]*in[\s-]*the[\s-]*dark\b/ },
        { key: 'grape',   color: '#7e22ce', pattern: /\bgrape\b/ },
        { key: 'coral',   color: '#fb7185', pattern: /\bcoral\b/ },
        { key: 'green',   color: '#16a34a', pattern: /\bgreen\b/ },
        { key: 'red',     color: '#dc2626', pattern: /\bred\b/ },
        { key: 'blue',    color: '#2563eb', pattern: /\bblue\b/ },
        { key: 'yellow',  color: '#eab308', pattern: /\byellow\b/ },
        { key: 'orange',  color: '#f97316', pattern: /\borange\b/ },
        { key: 'pink',    color: '#ec4899', pattern: /\bpink\b/ },
        { key: 'purple',  color: '#8b5cf6', pattern: /\bpurple\b/ },
        { key: 'white',   color: '#f8fafc', pattern: /\bwhite\b/ },
        { key: 'gold',    color: '#ca8a04', pattern: /\bgold\b/ },
        { key: 'silver',  color: '#94a3b8', pattern: /\bsilver\b/ }
      ];

      function withAlpha(hex, a) {
        const c = String(hex||'').replace('#','');
        if (c.length !== 6) return `rgba(20,20,20,${a})`;
        return `rgba(${parseInt(c.slice(0,2),16)},${parseInt(c.slice(2,4),16)},${parseInt(c.slice(4,6),16)},${a})`;
      }

      function resolveVinylColor(rule, translucent) {
        if (!rule?.color) return '#0b0b0b';
        if (translucent && rule.key === 'grape') return withAlpha(rule.color, 0.7);
        return translucent ? withAlpha(rule.color, 0.82) : rule.color;
      }

      function detectAmpersandVinylGradient(text, translucent) {
        const descriptor = String(text||'').split(';')[0] || '';
        if (!descriptor.includes('&')) return '';
        const rules = VINYL_COLOR_RULES.filter(r => r.key !== 'glow in the dark');
        for (const a of rules) {
          for (const b of rules) {
            if (a.key === b.key) continue;
            const pat = new RegExp(`${a.pattern.source}\\s*&\\s*${b.pattern.source}`);
            if (!pat.test(descriptor)) continue;
            return `linear-gradient(135deg, ${resolveVinylColor(a, translucent)} 0%, ${resolveVinylColor(b, translucent)} 100%)`;
          }
        }
        return '';
      }

      function detectVinylColors(rawText) {
        const text = String(rawText||'').toLowerCase();
        const formatSegment = text.split(';')[0] || text;
        if (!formatSegment) return ['#0b0b0b', ''];
        const translucent = /(translucent|transparent|clear)/.test(formatSegment);
        const clearOnly   = /\bclear\b/.test(formatSegment);
        const ampGrad = detectAmpersandVinylGradient(formatSegment, translucent);
        if (ampGrad) return [ampGrad, ''];
        const matched = VINYL_COLOR_RULES.filter(r => r.pattern.test(formatSegment));
        if (matched.length >= 2) return [resolveVinylColor(matched[0], translucent), resolveVinylColor(matched[1], translucent)];
        if (matched.length === 1) return clearOnly ? ['#f8fafc', ''] : [resolveVinylColor(matched[0], translucent), ''];
        if (translucent) return clearOnly ? ['#f8fafc', ''] : ['rgba(255,255,255,0.88)', ''];
        return ['#0b0b0b', ''];
      }

      function detectDiscType(rawText) {
        const t = String(rawText||'').toLowerCase();
        if (!t) return 'vinyl';
        const hasVinyl = /\bvinyl\b/.test(t);
        const hasCd    = /\bcd\b|compact\s*disc|cdr|cd-r/.test(t);
        if (hasVinyl && hasCd) return 'both';
        if (hasCd) return 'cd';
        return 'vinyl';
      }

      function detectDiscCount(rawText) {
        const t = String(rawText||'').toLowerCase();
        const m1 = t.match(/\bx\s*(\d+)\b/);
        if (m1 && Number(m1[1]) > 0) return Number(m1[1]);
        const m2 = t.match(/\b(\d+)\s*x\b/);
        if (m2 && Number(m2[1]) > 0) return Number(m2[1]);
        return 1;
      }

      function detectClearVinyl(rawText) {
        return /\bclear\b/.test(String(rawText||'').toLowerCase());
      }

      function appendDescriptorTokens(target, value) {
        if (value === null || value === undefined) return;
        if (typeof value === 'string' || typeof value === 'number') {
          const token = String(value).trim();
          if (token) target.push(token);
          return;
        }
        if (Array.isArray(value)) {
          value.forEach(v => appendDescriptorTokens(target, v));
          return;
        }
        if (typeof value === 'object') {
          Object.values(value).forEach(v => appendDescriptorTokens(target, v));
        }
      }

      function buildReleaseDescriptor(item) {
        const tokens = [];
        appendDescriptorTokens(tokens, item?.rawText);
        appendDescriptorTokens(tokens, item?.notes);
        appendDescriptorTokens(tokens, item?.format);
        appendDescriptorTokens(tokens, item?.formats);
        appendDescriptorTokens(tokens, item?.formatDescriptions);
        appendDescriptorTokens(tokens, item?.descriptions);
        return tokens.join(' ');
      }

      function normalizeAlbumIdentityPart(value) {
        return String(value || '')
          .toLowerCase()
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .replace(/&/g, ' and ')
          .replace(/[^a-z0-9]+/g, ' ')
          .trim()
          .replace(/\s+/g, ' ');
      }

      /* ─────────────── album collection lookup ─────────────── */
      let albumCollection = new Map(); // "title::artist" -> album meta

      async function loadAlbumCollection() {
        try {
          const r = await fetch(`./discogs-collection.json?t=${Date.now()}`, { cache: 'no-store' });
          if (!r.ok) return;
          const payload = await r.json();
          const items = Array.isArray(payload.items) ? payload.items : [];
          albumCollection = new Map();
          for (const item of items) {
            const descriptor = buildReleaseDescriptor(item);
            const [vinylColor, vinylColorSecondary] = detectVinylColors(descriptor);
            const meta = {
              vinylColor,
              vinylColorSecondary,
              discType:    detectDiscType(descriptor),
              discCount:   detectDiscCount(descriptor),
              isClearVinyl: detectClearVinyl(descriptor)
            };
            const key = `${normalizeAlbumIdentityPart(item.title)}::${normalizeAlbumIdentityPart(item.artist)}`;
            albumCollection.set(key, meta);
          }
        } catch { /* non-fatal */ }
      }

      function findAlbumMeta(title, artist) {
        const key = `${normalizeAlbumIdentityPart(title)}::${normalizeAlbumIdentityPart(artist)}`;
        return albumCollection.get(key) || null;
      }

      /* ─────────────── fun facts ─────────────── */
      let lastFactsSig = '';
      let funFactsTimer = null;

      function stopFunFacts() {
        if (!funFactsTimer) return;
        clearInterval(funFactsTimer);
        funFactsTimer = null;
      }

      function clearFunFacts() {
        const layer = document.getElementById('fun-facts-layer');
        stopFunFacts();
        layer.innerHTML = '';
      }

      function renderFunFacts(facts) {
        const layer = document.getElementById('fun-facts-layer');
        const rnd = (min, max) => Math.random() * (max - min) + min;
        layer.innerHTML = '';

        const leftLanes = [3, 8, 13, 18, 23];
        const rightLanes = [77, 82, 87, 92, 97];
        let leftIdx = 0;
        let rightIdx = 0;
        let nextSide = 'left';
        let i = 0;

        const createFact = (factText) => {
          const side = nextSide;
          nextSide = nextSide === 'left' ? 'right' : 'left';

          const lane = side === 'left'
            ? leftLanes[(leftIdx++) % leftLanes.length]
            : rightLanes[(rightIdx++) % rightLanes.length];

          const left = lane + rnd(-0.8, 0.8);
          const startY = rnd(93, 101);
          const dur = rnd(38, 46).toFixed(1);
          const rot = rnd(-3, 3).toFixed(1);
          const swayA = `${rnd(-16, 16).toFixed(0)}px`;
          const swayB = `${rnd(-16, 16).toFixed(0)}px`;
          const size = `${rnd(1.04, 1.20).toFixed(2)}rem`;

          const p = document.createElement('p');
          p.className = 'fun-fact';
          p.textContent = String(factText || '');
          p.style.left = `${left.toFixed(1)}%`;
          p.style.top = `${startY.toFixed(1)}%`;
          p.style.fontSize = size;
          p.style.setProperty('--dur', `${dur}s`);
          p.style.setProperty('--delay', '0s');
          p.style.setProperty('--rot', `${rot}deg`);
          p.style.setProperty('--sway-a', swayA);
          p.style.setProperty('--sway-b', swayB);
          p.style.animationIterationCount = '1';
          p.style.animationFillMode = 'forwards';
          layer.appendChild(p);

          setTimeout(() => {
            if (p.parentElement === layer) p.remove();
          }, (Number(dur) + 0.6) * 1000);
        };

        const queue = facts.slice(0, 24);
        if (!queue.length) return;

        createFact(queue[i++]);
        if (i >= queue.length) return;

        funFactsTimer = setInterval(() => {
          if (i >= queue.length) {
            stopFunFacts();
            return;
          }
          createFact(queue[i++]);
        }, 5000);
      }

      async function fetchAndRenderFunFacts(albumTitle, albumArtist) {
        const sig = `${albumTitle}|${albumArtist}`;
        if (sig === lastFactsSig) return;
        lastFactsSig = sig;
        clearFunFacts();
        try {
          const params = new URLSearchParams({ album: albumTitle, artist: albumArtist });
          const r = await fetch(`/api/fun-facts?${params}`, { cache: 'no-store' });
          if (!r.ok) return;
          const data = await r.json();
          // Discard if album changed while the fetch was in flight
          if (sig !== lastFactsSig) return;
          if (Array.isArray(data.facts) && data.facts.length) renderFunFacts(data.facts);
        } catch { /* non-fatal */ }
      }

      /* ─────────────── now-playing ─────────────── */
      const ambientBg  = document.getElementById('ambient-bg');
      const idleScreen = document.getElementById('idle-screen');
      const playScreen = document.getElementById('playing-screen');
      const npCover    = document.getElementById('np-cover');
      const npDisc     = document.getElementById('np-disc');
      const npDiscSec  = document.getElementById('np-disc-secondary');
      const npAlbum    = document.getElementById('np-album');
      const npArtist   = document.getElementById('np-artist');
      const npSong     = document.getElementById('np-song');
      const npThanks   = document.getElementById('np-thanks');

      function applyDiscVisual(data) {
        const meta = findAlbumMeta(data.albumTitle, data.albumArtist);
        const discType      = meta?.discType === 'cd' ? 'cd' : 'vinyl';
        const primaryColor  = String(meta?.vinylColor || '#0b0b0b').trim() || '#0b0b0b';
        const secondaryColor = String(meta?.vinylColorSecondary || '').trim();
        const discCount     = Number(meta?.discCount || 1);
        const showSecond    = discCount > 1 || Boolean(secondaryColor);
        const isClear       = discType === 'vinyl' && Boolean(meta?.isClearVinyl);

        // Spin speed: album scope = slower, song scope = faster (matches phone app)
        const scope = data.reviewScope === 'album' ? 'album' : 'song';
        const primarySpeed   = scope === 'album' ? '3.8s' : '1.9s';
        const secondarySpeed = scope === 'album' ? '5.3s' : '2.7s';
        npDisc.style.animationDuration    = primarySpeed;
        npDiscSec.style.animationDuration = secondarySpeed;

        npDisc.style.setProperty('--disc-color', primaryColor);
        npDiscSec.style.setProperty('--disc-color', secondaryColor || primaryColor);

        npDisc.classList.toggle('cd-disc',     discType === 'cd');
        npDiscSec.classList.toggle('cd-disc',  discType === 'cd');
        npDisc.classList.toggle('clear-vinyl',    isClear);
        npDiscSec.classList.toggle('clear-vinyl', isClear);
        npDiscSec.classList.toggle('visible', showSecond);
      }

      function showPlaying(data) {
        const coverUrl = String(data.coverUrl || '').trim() || albumCoverFallbackUrl;
        const sig = `${data.albumTitle}|${data.songTitle}|${coverUrl}`;
        const changed = sig !== lastNpSig;
        lastNpSig = sig;

        ambientBg.style.backgroundImage = `url(${coverUrl})`;
        ambientBg.style.opacity = '1';

        if (changed) {
          npCover.classList.remove('arriving');
          void npCover.offsetWidth;
          npCover.onerror = () => {
            npCover.onerror = null;
            npCover.src = albumCoverFallbackUrl;
          };
          npCover.src = coverUrl;
          npCover.classList.add('arriving');
          fetchAndRenderFunFacts(data.albumTitle, data.albumArtist);
        }

        applyDiscVisual(data);

        npAlbum.textContent = data.albumTitle || '';
        npArtist.textContent = data.albumArtist || '';
        const hasSong = data.reviewScope === 'song' && data.songTitle;
        npSong.hidden = !hasSong;
        if (hasSong) npSong.textContent = data.songTitle;
        const hasThanks = Boolean(data.adminThanks);
        npThanks.hidden = !hasThanks;
        if (hasThanks) npThanks.textContent = data.adminThanks;

        idleScreen.classList.add('hidden');
        playScreen.classList.add('visible');
      }

      function showIdle() {
        lastNpSig = '';
        lastFactsSig = '';
        currentNowPlaying = null;
        ambientBg.style.opacity = '0';
        idleScreen.classList.remove('hidden');
        playScreen.classList.remove('visible');
        renderReviews([], []);
        clearFunFacts();
      }

      async function pollNowPlaying() {
        try {
          const r = await fetch('./now-playing.json?t=' + Date.now());
          if (!r.ok) { showIdle(); return; }
          const data = await r.json();
          if (data && data.albumTitle) {
            currentNowPlaying = data;
            showPlaying(data);
            // Immediately fetch reviews when now-playing changes
            await pollReviews();
          } else {
            showIdle();
          }
        } catch {
          showIdle();
        }
      }

      /* ─────────────── fullscreen ─────────────── */
      const fsBtn = document.getElementById('fs-btn');
      fsBtn.addEventListener('click', () => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
      });
      document.addEventListener('fullscreenchange', () => {
        fsBtn.textContent = document.fullscreenElement ? '✕' : '⛶';
        fsBtn.title = document.fullscreenElement ? 'Exit fullscreen' : 'Fullscreen';
      });

      /* ─────────────── start ─────────────── */
      applyDesktopScale();
      window.addEventListener('resize', () => {
        applyDesktopScale();
        syncEntities();
      });
      document.documentElement.requestFullscreen().catch(() => {});
      loadAlbumCollection().then(() => {
        pollNowPlaying();
        pollReviews();
      });
      pollUsers();
      setInterval(pollNowPlaying, 2000);
      setInterval(pollUsers, 2000);
      setInterval(pollReviews, 3000);
      // Refresh album collection every 5 min in case new records are added
      setInterval(loadAlbumCollection, 5 * 60 * 1000);
    </script>
  </body>
</html>
